<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Cat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            touch-action: none; /* Prevent scrolling on canvas */
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }

        #game-container {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: center;
        }

        canvas {
            background-color: #2ecc71;
            border: 4px solid #34495e;
            border-radius: 8px;
            image-rendering: pixelated; /* Ensure crisp pixels */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            cursor: crosshair;
            width: 100%;
            max-width: 600px;
            height: auto;
            aspect-ratio: 600 / 400;
            box-sizing: border-box;
        }

        #ui-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 600px;
            background: #34495e;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #2c3e50;
        }

        .controls-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            font-family: 'Press Start 2P', cursive;
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px #c0392b;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 #c0392b;
        }

        button.selected {
            background-color: #f1c40f;
            color: #2c3e50;
            box-shadow: 0 4px #f39c12;
        }

        button.selected:active {
             box-shadow: 0 0 #f39c12;
        }

        button:disabled {
            background-color: #7f8c8d;
            box-shadow: 0 4px #95a5a6;
            cursor: not-allowed;
            color: #bdc3c7;
        }

        #stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 10px;
            padding: 0 10px;
        }

        #save-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        select, input {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 5px;
            border: 2px solid #2c3e50;
            border-radius: 4px;
            max-width: 100%;
            box-sizing: border-box;
        }

        /* Modal Styles */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #modal-overlay.hidden {
            display: none;
        }

        .modal {
            background: #34495e;
            padding: 20px;
            border-radius: 8px;
            border: 4px solid #e74c3c;
            text-align: center;
            max-width: 400px;
        }

        .modal h2 { margin-top: 0; font-size: 16px; }
        .modal input, .modal select { margin-bottom: 15px; width: 80%; display: block; margin-left: auto; margin-right: auto;}
    </style>
</head>
<body>

    <h1>Pet Cat</h1>

    <div id="game-container">
        <!-- Canvas will be dynamically sized in JS to maintain aspect ratio -->
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <div id="ui-panel">
        <div id="stats">
            <span id="cat-name-display">Name: ???</span>
            <span id="relationship-display">Relationship: 0</span>
        </div>

        <div class="controls-row">
            <button id="tool-brush" class="selected">Brush</button>
            <button id="tool-treat">Treat</button>
            <button id="tool-dangly" disabled title="Unlock at Rel 50">Dangly Toy</button>
            <button id="tool-laser" disabled title="Unlock at Rel 150">Laser Pointer</button>
        </div>

        <div id="save-controls">
            <select id="save-selector">
                <!-- Populated by JS -->
            </select>
            <button id="btn-new-save">New Save</button>
        </div>
    </div>

    <!-- New Save Modal -->
    <div id="modal-overlay">
        <div class="modal">
            <h2>Adopt a New Cat</h2>
            <input type="text" id="new-cat-name" placeholder="Cat's Name" maxlength="15">
            <select id="new-cat-type">
                <option value="orange">Orange Tabby</option>
                <option value="black">Void (Black)</option>
                <option value="white">Cloud (White)</option>
                <option value="tuxedo">Tuxedo</option>
            </select>
            <button id="btn-adopt">Adopt!</button>
        </div>
    </div>

    <script>
        // Game State
        const STATE_KEY = 'petCatSaves';
        let saves = {};
        let currentSaveId = null;

        let gameState = {
            name: "???",
            type: "orange",
            relationship: 0,
            unlockedDangly: false,
            unlockedLaser: false
        };

        // UI Elements
        const modalOverlay = document.getElementById('modal-overlay');
        const newCatNameInput = document.getElementById('new-cat-name');
        const newCatTypeSelect = document.getElementById('new-cat-type');
        const btnAdopt = document.getElementById('btn-adopt');
        const saveSelector = document.getElementById('save-selector');
        const btnNewSave = document.getElementById('btn-new-save');

        const catNameDisplay = document.getElementById('cat-name-display');
        const relationshipDisplay = document.getElementById('relationship-display');

        const toolButtons = {
            brush: document.getElementById('tool-brush'),
            treat: document.getElementById('tool-treat'),
            dangly: document.getElementById('tool-dangly'),
            laser: document.getElementById('tool-laser')
        };

        let currentTool = 'brush';

        // Graphics and Loop
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const PIXEL_SIZE = 4;
        let lastTime = 0;

        const catColors = {
            orange: { base: '#f39c12', dark: '#d35400', light: '#f1c40f', belly: '#ecf0f1' },
            black: { base: '#2c3e50', dark: '#1a252f', light: '#34495e', belly: '#7f8c8d' },
            white: { base: '#ecf0f1', dark: '#bdc3c7', light: '#ffffff', belly: '#ffffff' },
            tuxedo: { base: '#2c3e50', dark: '#1a252f', light: '#ffffff', belly: '#ffffff' }
        };

        let catEntity = {
            x: 300,
            y: 200,
            targetX: 300,
            targetY: 200,
            vx: 0,
            vy: 0,
            speed: 100, // px per sec
            state: 'idle', // idle, walking, eating, purring, chasing
            stateTime: 0,
            facingRight: true,
            frame: 0
        };

        // Game Objects
        let treats = [];
        let particles = [];
        let mouseX = 0;
        let mouseY = 0;
        let interactionActive = false; // Is mouse down/touching?

        // Initialization
        function init() {
            loadSaves();
            setupEventListeners();
            requestAnimationFrame(gameLoop);
        }

        // Game Loop
        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            if (dt < 0.1) { // Cap dt to avoid large jumps if tab is inactive
                update(dt);
                draw();
            }

            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            if (!currentSaveId) return;

            catEntity.stateTime += dt;

            // Cat Logic
            const dx = catEntity.targetX - catEntity.x;
            const dy = catEntity.targetY - catEntity.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (catEntity.state === 'walking' || catEntity.state === 'chasing') {
                if (dist > 5) {
                    const normX = dx / dist;
                    const normY = dy / dist;
                    const currentSpeed = catEntity.state === 'chasing' ? catEntity.speed * 2 : catEntity.speed;
                    catEntity.x += normX * currentSpeed * dt;
                    catEntity.y += normY * currentSpeed * dt;
                    catEntity.facingRight = normX > 0;

                    // Animation
                    catEntity.frame = Math.floor(catEntity.stateTime * 5) % 2;
                } else {
                    catEntity.x = catEntity.targetX;
                    catEntity.y = catEntity.targetY;
                    catEntity.state = 'idle';
                    catEntity.frame = 0;
                }
            } else if (catEntity.state === 'idle') {
                 catEntity.frame = 0;
                 // Random wander
                 if (catEntity.stateTime > 3 && Math.random() < 0.02) {
                     if (Math.random() < 0.2) {
                         // Go to cat tower
                         catEntity.targetX = 450 + (Math.random() - 0.5) * 40; // near the platforms
                         catEntity.targetY = 145; // resting near platforms
                     } else {
                         catEntity.targetX = Math.max(50, Math.min(canvas.width - 50, catEntity.x + (Math.random() - 0.5) * 200));
                         catEntity.targetY = Math.max(50, Math.min(canvas.height - 50, catEntity.y + (Math.random() - 0.5) * 100));
                     }
                     catEntity.state = 'walking';
                     catEntity.stateTime = 0;
                 }
            } else if (catEntity.state === 'purring') {
                 catEntity.frame = Math.floor(catEntity.stateTime * 4) % 2; // purr wiggle

                 // Spawn heart particles occasionally
                 if (Math.random() < 0.05) {
                     particles.push({
                         x: catEntity.x + (Math.random() - 0.5) * 20,
                         y: catEntity.y - 10,
                         vx: (Math.random() - 0.5) * 10,
                         vy: -15 - Math.random() * 10,
                         life: 1.0, // seconds
                         maxLife: 1.0
                     });
                 }
            } else if (catEntity.state === 'eating') {
                 catEntity.frame = Math.floor(catEntity.stateTime * 6) % 2; // eating bop
                 if (catEntity.stateTime > 2) {
                     catEntity.state = 'idle';
                     catEntity.stateTime = 0;
                 }
            }

            // Particles logic
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Treat logic
            if (treats.length > 0 && catEntity.state !== 'eating' && catEntity.state !== 'chasing') {
                const treat = treats[0];
                catEntity.targetX = treat.x;
                catEntity.targetY = treat.y;
                catEntity.state = 'walking';

                const tdx = treat.x - catEntity.x;
                const tdy = treat.y - catEntity.y;
                if (Math.sqrt(tdx*tdx + tdy*tdy) < 20) {
                    treats.shift(); // Eat it
                    catEntity.state = 'eating';
                    catEntity.stateTime = 0;
                    addRelationship(5);
                }
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw some grass
            ctx.fillStyle = '#27ae60';
            for (let i = 0; i < 50; i++) {
                // simple seeded-like random positions so they don't flicker
                // we can just use a pseudo-random trick based on i
                let gx = (i * 137) % canvas.width;
                let gy = (i * 93) % canvas.height;
                ctx.fillRect(gx, gy, 2, 8);
                ctx.fillRect(gx + 2, gy + 2, 2, 6);
            }

            // Draw Cat Tower (x=450, y=150)
            ctx.save();
            ctx.translate(450, 150);

            // Base
            ctx.fillStyle = '#bdc3c7';
            ctx.fillRect(-40, 60, 80, 10);

            // Posts
            ctx.fillStyle = '#d35400'; // scratch post brown
            ctx.fillRect(-25, 0, 10, 60);
            ctx.fillRect(15, -40, 10, 100);

            // Platforms
            ctx.fillStyle = '#ecf0f1';
            ctx.fillRect(-40, 0, 50, 10); // lower platform
            ctx.fillRect(0, -40, 50, 10); // upper platform

            // Little hanging toy
            ctx.beginPath();
            ctx.moveTo(40, -30);
            ctx.lineTo(40, -10);
            ctx.strokeStyle = 'white';
            ctx.stroke();
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(40, -8, 4, 0, Math.PI*2);
            ctx.fill();

            ctx.restore();

            if (!currentSaveId) {
                ctx.fillStyle = 'white';
                ctx.font = '20px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText("Please Adopt a Cat!", canvas.width/2, canvas.height/2);
                return;
            }

            // Draw shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(catEntity.x, catEntity.y + 15, 30, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // Draw treats
            for (let t of treats) {
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(t.x - 4, t.y - 4, 8, 8);
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(t.x - 2, t.y - 2, 4, 4);
            }

            drawCat();

            // Draw Particles
            for (let p of particles) {
                ctx.fillStyle = `rgba(231, 76, 60, ${p.life / p.maxLife})`;
                // Simple pixel heart
                ctx.fillRect(p.x - 2, p.y - 2, 2, 2);
                ctx.fillRect(p.x + 2, p.y - 2, 2, 2);
                ctx.fillRect(p.x - 4, p.y, 10, 2);
                ctx.fillRect(p.x - 2, p.y + 2, 6, 2);
                ctx.fillRect(p.x, p.y + 4, 2, 2);
            }

            // Draw UI Overlays (Toys)
            if (interactionActive && currentTool === 'brush') {
                // Draw pixel brush cursor
                ctx.save();
                ctx.translate(mouseX - 50, mouseY - 60);
                const bp = 3; // brush pixel size

                // Brush handle
                ctx.fillStyle = '#8e44ad';
                ctx.fillRect(0, -6*bp, 2*bp, 5*bp);
                ctx.fillStyle = '#9b59b6';
                ctx.fillRect(0, -6*bp, 1*bp, 5*bp); // highlight

                // Brush head
                ctx.fillStyle = '#f39c12';
                ctx.fillRect(-2*bp, -1*bp, 6*bp, 2*bp);

                // Bristles
                ctx.fillStyle = '#ecf0f1';
                ctx.fillRect(-2*bp, 1*bp, 6*bp, 2*bp);
                ctx.fillStyle = '#bdc3c7';
                for(let i=0; i<6; i+=2) {
                    ctx.fillRect((-2+i)*bp, 1*bp, 1*bp, 2*bp);
                }

                ctx.restore();
            } else if (interactionActive && currentTool === 'laser') {
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,0,0,0.3)';
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 8, 0, Math.PI*2);
                ctx.fill();
            } else if (interactionActive && currentTool === 'dangly') {
                const tx = mouseX - 50;
                const ty = mouseY - 60;

                // Draw string
                ctx.beginPath();
                ctx.moveTo(tx, ty);
                ctx.lineTo(tx, 0); // string to top
                ctx.stroke();

                // Draw pixel bird
                ctx.save();
                ctx.translate(tx, ty);
                const p = 2; // pixel size for bird

                // Bird body (blue)
                ctx.fillStyle = '#3498db';
                ctx.fillRect(-3*p, -2*p, 6*p, 4*p);
                ctx.fillRect(-2*p, -3*p, 4*p, 1*p); // top head
                ctx.fillRect(-2*p, 2*p, 4*p, 1*p); // bottom

                // Eye (white + black)
                ctx.fillStyle = 'white';
                ctx.fillRect(1*p, -2*p, 2*p, 2*p);
                ctx.fillStyle = 'black';
                ctx.fillRect(2*p, -1*p, 1*p, 1*p);

                // Beak (yellow)
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(3*p, 0, 2*p, 1*p);

                // Wing (dark blue)
                ctx.fillStyle = '#2980b9';
                ctx.fillRect(-2*p, 0, 3*p, 2*p);

                // Tail
                ctx.fillStyle = '#3498db';
                ctx.fillRect(-5*p, -1*p, 2*p, 2*p);

                ctx.restore();
            }
        }

        function drawCat() {
            ctx.save();
            ctx.translate(catEntity.x, catEntity.y);

            if (!catEntity.facingRight) {
                ctx.scale(-1, 1);
            }

            const colors = catColors[gameState.type];
            let bopY = 0;

            if (catEntity.state === 'walking' || catEntity.state === 'chasing') {
                bopY = catEntity.frame === 0 ? -2 : 0;
            } else if (catEntity.state === 'purring') {
                bopY = catEntity.frame === 0 ? 1 : 0;
            } else if (catEntity.state === 'eating') {
                bopY = catEntity.frame === 0 ? 3 : 0;
            }

            ctx.translate(0, bopY);

            // Simple blocky cat drawing
            const p = PIXEL_SIZE;

            // Tail
            ctx.fillStyle = colors.dark;
            if (catEntity.state === 'purring') {
                // Happy purring wag (larger range)
                ctx.fillRect(-8*p, (catEntity.frame === 0 ? -2 : -5)*p, 2*p, 6*p);
            } else if (catEntity.state === 'walking') {
                ctx.fillRect(-8*p, (catEntity.frame === 0 ? -3 : -4)*p, 2*p, 6*p);
            } else {
                ctx.fillRect(-8*p, -3*p, 2*p, 6*p);
            }

            // Body
            ctx.fillStyle = colors.base;
            ctx.fillRect(-6*p, -2*p, 10*p, 6*p);

            // Belly
            ctx.fillStyle = colors.belly;
            ctx.fillRect(-4*p, 2*p, 6*p, 2*p);

            // Legs
            ctx.fillStyle = colors.dark;
            if (catEntity.state === 'walking' || catEntity.state === 'chasing') {
                const swing = catEntity.frame === 0 ? 1 : -1;
                ctx.fillRect(-5*p + swing*p, 4*p, 2*p, 2*p); // Back
                ctx.fillRect(1*p - swing*p, 4*p, 2*p, 2*p); // Front
            } else {
                ctx.fillRect(-5*p, 4*p, 2*p, 2*p);
                ctx.fillRect(1*p, 4*p, 2*p, 2*p);
            }

            // Head
            ctx.fillStyle = colors.base;
            ctx.fillRect(2*p, -4*p, 6*p, 5*p);

            // Ears
            ctx.fillStyle = colors.dark;
            ctx.fillRect(2*p, -6*p, 2*p, 2*p);
            ctx.fillRect(6*p, -6*p, 2*p, 2*p);

            // Eyes
            ctx.fillStyle = '#000';
            if (catEntity.state === 'purring') {
                // Closed, happy eyes (horizontal lines, slightly darker base color)
                ctx.fillStyle = colors.dark;
                ctx.fillRect(3*p, -1*p, 2*p, 1*p);
                ctx.fillRect(7*p, -1*p, 2*p, 1*p);
            } else {
                ctx.fillRect(4*p, -2*p, 1*p, 1*p);
                ctx.fillRect(7*p, -2*p, 1*p, 1*p);
            }

            // Nose/Mouth
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(6*p, -1*p, 1*p, 1*p);

            ctx.restore();
        }

        // Save/Load Logic
        function loadSaves() {
            const savedData = localStorage.getItem(STATE_KEY);
            if (savedData) {
                try {
                    saves = JSON.parse(savedData);
                } catch (e) {
                    console.error("Failed to parse saves", e);
                    saves = {};
                }
            }

            updateSaveSelector();

            const saveIds = Object.keys(saves);
            if (saveIds.length === 0) {
                // No saves, show creation modal
                showModal();
            } else {
                // Load first available save by default or the last played (for simplicity, first available)
                loadGame(saveIds[0]);
                modalOverlay.classList.add('hidden');
            }
        }

        function saveGame() {
            if (!currentSaveId) return;
            saves[currentSaveId] = { ...gameState };
            localStorage.setItem(STATE_KEY, JSON.stringify(saves));
            updateSaveSelector();
        }

        function loadGame(saveId) {
            if (saves[saveId]) {
                currentSaveId = saveId;
                gameState = { ...saves[saveId] };
                saveSelector.value = saveId;
                updateUI();
            }
        }

        function createNewSave(name, type) {
            const id = 'save_' + Date.now();
            gameState = {
                name: name || "Kitty",
                type: type,
                relationship: 0,
                unlockedDangly: false,
                unlockedLaser: false
            };
            currentSaveId = id;
            saveGame();
            modalOverlay.classList.add('hidden');
            updateUI();
        }

        function updateSaveSelector() {
            saveSelector.innerHTML = '';
            const saveIds = Object.keys(saves);
            if(saveIds.length === 0) {
                const opt = document.createElement('option');
                opt.value = "";
                opt.textContent = "No Saves";
                saveSelector.appendChild(opt);
                return;
            }

            for (const id in saves) {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = saves[id].name;
                saveSelector.appendChild(opt);
            }
            if (currentSaveId) {
                saveSelector.value = currentSaveId;
            }
        }

        // UI Updates
        function updateUI() {
            catNameDisplay.textContent = `Name: ${gameState.name}`;
            relationshipDisplay.textContent = `Relationship: ${Math.floor(gameState.relationship)}`;

            // Check unlocks
            if (gameState.relationship >= 50) gameState.unlockedDangly = true;
            if (gameState.relationship >= 150) gameState.unlockedLaser = true;

            toolButtons.dangly.disabled = !gameState.unlockedDangly;
            toolButtons.laser.disabled = !gameState.unlockedLaser;

            toolButtons.dangly.textContent = gameState.unlockedDangly ? "Dangly Toy" : "Dangly (Rel 50)";
            toolButtons.laser.textContent = gameState.unlockedLaser ? "Laser Pointer" : "Laser (Rel 150)";

            if(currentTool === 'dangly' && !gameState.unlockedDangly) selectTool('brush');
            if(currentTool === 'laser' && !gameState.unlockedLaser) selectTool('brush');
        }

        function selectTool(toolId) {
            if (toolButtons[toolId].disabled) return;

            currentTool = toolId;
            for (const key in toolButtons) {
                toolButtons[key].classList.remove('selected');
            }
            toolButtons[toolId].classList.add('selected');
        }

        function addRelationship(amount) {
            gameState.relationship += amount;
            updateUI();
            saveGame();
        }

        // Audio Synthesizer for Purring
        let audioCtx;
        let purrOscillator;
        let purrGain;
        let isPurring = false;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                purrOscillator = audioCtx.createOscillator();
                purrGain = audioCtx.createGain();

                purrOscillator.type = 'sawtooth';
                purrOscillator.frequency.value = 25; // Low rumble

                purrGain.gain.value = 0; // Start silent

                // Lowpass filter to muffle it
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 150;

                purrOscillator.connect(filter);
                filter.connect(purrGain);
                purrGain.connect(audioCtx.destination);

                purrOscillator.start();
            }
            if(audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function setPurring(active) {
            if (!audioCtx) return;
            if (active && !isPurring) {
                purrGain.gain.cancelScheduledValues(audioCtx.currentTime);
                purrGain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.1);
                isPurring = true;
            } else if (!active && isPurring) {
                purrGain.gain.cancelScheduledValues(audioCtx.currentTime);
                purrGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
                isPurring = false;
            }
        }

        function handleInteraction(e) {
            if (!currentSaveId) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            mouseX = (clientX - rect.left) * scaleX;
            mouseY = (clientY - rect.top) * scaleY;

            // Check if over cat
            const overCat = Math.abs(mouseX - catEntity.x) < 40 && Math.abs(mouseY - catEntity.y) < 30;

            if (currentTool === 'brush') {
                const brushX = mouseX - 50;
                const brushY = mouseY - 60;
                const brushOverCat = Math.abs(brushX - catEntity.x) < 40 && Math.abs(brushY - catEntity.y) < 30;

                if (interactionActive && brushOverCat) {
                    if(catEntity.state !== 'eating') {
                        catEntity.state = 'purring';
                        catEntity.targetX = catEntity.x; // stop moving
                        catEntity.targetY = catEntity.y;
                        setPurring(true);
                        // Add tiny amounts of relationship while brushing
                        if (Math.random() < 0.1) addRelationship(0.1);
                    }
                } else {
                    if (catEntity.state === 'purring') {
                        catEntity.state = 'idle';
                    }
                    setPurring(false);
                }
            } else if (currentTool === 'laser') {
                if (interactionActive) {
                    catEntity.targetX = mouseX;
                    catEntity.targetY = mouseY;
                    catEntity.state = 'chasing';
                    setPurring(false);
                }
            } else if (currentTool === 'dangly') {
                if (interactionActive) {
                     const danglyX = mouseX - 50;
                     const danglyY = mouseY - 60;

                     // Cat bats at it if close
                     const dist = Math.sqrt(Math.pow(danglyX - catEntity.x, 2) + Math.pow(danglyY - catEntity.y, 2));
                     if (dist < 60) {
                         catEntity.state = 'purring'; // repurpose purring animation for batting
                         catEntity.facingRight = danglyX > catEntity.x;
                         if (Math.random() < 0.05) addRelationship(0.2);
                     } else {
                         catEntity.targetX = danglyX;
                         catEntity.targetY = danglyY + 40; // Aim below toy
                         catEntity.state = 'walking';
                     }
                     setPurring(false);
                }
            }
        }

        function handleClick(e) {
             if (!currentSaveId) return;
             initAudio(); // Initialize audio context on first click

             if (currentTool === 'treat') {
                 treats.push({x: mouseX, y: mouseY});
                 // Switch back to brush after dropping a treat
                 selectTool('brush');
             }
        }

        // Event Listeners
        function setupEventListeners() {
            // Pointer events for canvas
            canvas.addEventListener('mousedown', (e) => {
                interactionActive = true;
                handleClick(e);
                handleInteraction(e);
            });
            canvas.addEventListener('mousemove', (e) => {
                handleInteraction(e);
            });
            canvas.addEventListener('mouseup', () => {
                interactionActive = false;
                setPurring(false);
                if(catEntity.state === 'purring' || catEntity.state === 'chasing') catEntity.state = 'idle';
            });
            canvas.addEventListener('mouseleave', () => {
                interactionActive = false;
                setPurring(false);
                if(catEntity.state === 'purring' || catEntity.state === 'chasing') catEntity.state = 'idle';
            });

            // Touch events for canvas (prevent default scrolling)
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                interactionActive = true;
                handleClick(e);
                handleInteraction(e);
            }, {passive: false});
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                handleInteraction(e);
            }, {passive: false});
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                interactionActive = false;
                setPurring(false);
                if(catEntity.state === 'purring' || catEntity.state === 'chasing') catEntity.state = 'idle';
            }, {passive: false});


            btnAdopt.addEventListener('click', () => {
                const name = newCatNameInput.value.trim();
                const type = newCatTypeSelect.value;
                if (name) {
                    createNewSave(name, type);
                    initAudio(); // Init audio on adopt
                }
            });

            btnNewSave.addEventListener('click', () => {
                showModal();
            });

            saveSelector.addEventListener('change', (e) => {
                if (e.target.value) {
                    loadGame(e.target.value);
                }
            });

            toolButtons.brush.addEventListener('click', () => selectTool('brush'));
            toolButtons.treat.addEventListener('click', () => selectTool('treat'));
            toolButtons.dangly.addEventListener('click', () => selectTool('dangly'));
            toolButtons.laser.addEventListener('click', () => selectTool('laser'));
        }

        function showModal() {
            newCatNameInput.value = '';
            modalOverlay.classList.remove('hidden');
        }

        // Start
        window.onload = init;
    </script>
</body>
</html>
