<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Conway's Game of Life</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    background: #000;
    color: #33ff33;
    font-family: "Courier New", Courier, monospace;
    overflow: hidden;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 12px 8px;
    gap: 0;
  }

  /* CRT phosphor scanline overlay */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  h1 {
    font-size: clamp(12px, 2.5vw, 18px);
    letter-spacing: clamp(2px, 1vw, 6px);
    text-transform: uppercase;
    color: #33ff33;
    text-shadow: 0 0 8px #33ff33, 0 0 16px #33ff33;
    font-weight: normal;
    white-space: nowrap;
  }

  .subtitle {
    font-size: clamp(8px, 1.5vw, 10px);
    letter-spacing: clamp(1px, 0.6vw, 3px);
    color: #1a8c1a;
    text-shadow: 0 0 6px #1a8c1a;
    margin-bottom: 6px;
  }

  #canvas-wrapper {
    flex: 1;
    min-height: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: crosshair;
    border: 1px solid #1a8c1a;
    box-shadow: 0 0 12px rgba(51,255,51,0.25), inset 0 0 8px rgba(0,0,0,0.5);
    line-height: 0;
    overflow: hidden;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 7px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 4px;
    border: 1px solid #1a5c1a;
    padding: 4px 8px;
    background: #000;
  }

  .ctrl-label {
    font-size: clamp(7px, 1.2vw, 9px);
    letter-spacing: 2px;
    color: #1a8c1a;
    text-transform: uppercase;
  }

  button {
    background: #000;
    color: #33ff33;
    border: 1px solid #33ff33;
    font-family: "Courier New", Courier, monospace;
    font-size: clamp(9px, 1.5vw, 11px);
    letter-spacing: 1px;
    padding: 4px 8px;
    cursor: pointer;
    text-transform: uppercase;
    text-shadow: 0 0 6px #33ff33;
    box-shadow: 0 0 4px rgba(51,255,51,0.2);
    transition: background 0.1s, color 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  button:hover {
    background: #33ff33;
    color: #000;
    text-shadow: none;
  }

  button:active {
    background: #1aaa1a;
    color: #000;
  }

  button.active {
    background: #33ff33;
    color: #000;
    text-shadow: none;
  }

  .speed-btn {
    min-width: 28px;
    text-align: center;
  }

  .stats {
    display: flex;
    gap: clamp(10px, 3vw, 24px);
    margin-top: 5px;
    font-size: clamp(9px, 1.5vw, 11px);
    letter-spacing: 2px;
    color: #1a8c1a;
  }

  .stat-val {
    color: #33ff33;
    text-shadow: 0 0 6px #33ff33;
  }

  .hint {
    margin-top: 4px;
    font-size: clamp(7px, 1.2vw, 9px);
    letter-spacing: 1px;
    color: #0d5c0d;
    text-align: center;
  }

  @media (max-width: 480px) {
    .hint { display: none; }
  }
</style>
</head>
<body>
<h1>Conway's Game of Life</h1>
<div class="subtitle">J.H. Conway &mdash; 1970</div>

<div id="canvas-wrapper">
  <canvas id="grid"></canvas>
</div>

<div class="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">Control</span>
    <button id="btn-play" class="active" onclick="togglePlay()">&#9646;&#9646; Pause</button>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Speed</span>
    <button class="speed-btn active" id="spd-1" onclick="setSpeed(1)">1x</button>
    <button class="speed-btn" id="spd-2" onclick="setSpeed(2)">2x</button>
    <button class="speed-btn" id="spd-4" onclick="setSpeed(4)">4x</button>
    <button class="speed-btn" id="spd-8" onclick="setSpeed(8)">8x</button>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Board</span>
    <button onclick="randomize()">Random</button>
    <button onclick="clearBoard()">Clear</button>
  </div>
</div>

<div class="stats">
  <span>GEN: <span class="stat-val" id="gen-count">0</span></span>
  <span>POP: <span class="stat-val" id="pop-count">0</span></span>
  <span>SPEED: <span class="stat-val" id="speed-display">1x</span></span>
</div>

<div class="hint">CLICK OR DRAG TO TOGGLE CELLS &nbsp;|&nbsp; PLAY/PAUSE: SPACE</div>

<script>
  const DEAD_COLOR  = '#000000';
  const ALIVE_COLOR = '#33ff33';
  const GRID_COLOR  = '#0a2a0a';
  const MIN_CELL = 6;
  const MAX_CELL = 14;
  const FRAME_MS = 120; // ms per step at 1x

  // --- Mutable layout (recomputed on resize) ---
  let CELL = 11;
  let COLS = 70;
  let ROWS = 50;

  // --- State ---
  let grid = new Uint8Array(COLS * ROWS);
  let next = new Uint8Array(COLS * ROWS);
  let running = true;
  let generation = 0;
  let speedMult = 1;
  let lastStep = 0;

  // Drawing state
  let isPointerDown = false;
  let drawMode = null;

  // --- Canvas ---
  const canvas = document.getElementById('grid');
  const ctx = canvas.getContext('2d');
  const wrapper = document.getElementById('canvas-wrapper');

  // --- Layout: fit canvas to wrapper ---
  function computeLayout() {
    const w = wrapper.clientWidth;
    const h = wrapper.clientHeight;
    if (w <= 0 || h <= 0) return false;

    // Pick the largest cell size where grid still fits
    const cellByW = Math.floor(w / 10); // at least 10 cols
    const cellByH = Math.floor(h / 8);  // at least 8 rows
    const rawCell = Math.min(cellByW, cellByH);
    const cell = Math.max(MIN_CELL, Math.min(MAX_CELL, rawCell));

    const cols = Math.floor(w / cell);
    const rows = Math.floor(h / cell);

    if (cols === COLS && rows === ROWS && cell === CELL) return false;

    // Preserve existing cells by mapping old grid → new grid
    const oldGrid = grid;
    const oldCols = COLS;
    const oldRows = ROWS;

    CELL = cell;
    COLS = cols;
    ROWS = rows;

    grid = new Uint8Array(COLS * ROWS);
    next = new Uint8Array(COLS * ROWS);

    // Copy cells (top-left aligned)
    const copyC = Math.min(oldCols, COLS);
    const copyR = Math.min(oldRows, ROWS);
    for (let y = 0; y < copyR; y++) {
      for (let x = 0; x < copyC; x++) {
        grid[y * COLS + x] = oldGrid[y * oldCols + x];
      }
    }

    canvas.width  = COLS * CELL;
    canvas.height = ROWS * CELL;
    return true;
  }

  // --- Init: random ---
  function randomize() {
    for (let i = 0; i < grid.length; i++) {
      grid[i] = Math.random() < 0.3 ? 1 : 0;
    }
    generation = 0;
    updateStats();
    render();
  }

  function clearBoard() {
    grid.fill(0);
    generation = 0;
    updateStats();
    render();
  }

  function idx(x, y) { return y * COLS + x; }

  // --- Neighbour count with toroidal wrap ---
  function neighbours(x, y) {
    let n = 0;
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue;
        n += grid[((y + dy + ROWS) % ROWS) * COLS + ((x + dx + COLS) % COLS)];
      }
    }
    return n;
  }

  // --- Step ---
  function step() {
    let pop = 0;
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const i = idx(x, y);
        const n = neighbours(x, y);
        const alive = grid[i];
        next[i] = alive ? ((n === 2 || n === 3) ? 1 : 0) : (n === 3 ? 1 : 0);
        pop += next[i];
      }
    }
    const tmp = grid; grid = next; next = tmp;
    generation++;
    return pop;
  }

  // --- Render ---
  function render() {
    ctx.fillStyle = DEAD_COLOR;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.fillStyle = GRID_COLOR;
    for (let x = 0; x < COLS; x++) ctx.fillRect(x * CELL, 0, 1, canvas.height);
    for (let y = 0; y < ROWS; y++) ctx.fillRect(0, y * CELL, canvas.width, 1);

    // Cells
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (!grid[idx(x, y)]) continue;
        ctx.fillStyle = ALIVE_COLOR;
        ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
        if (CELL >= 8) {
          ctx.fillStyle = 'rgba(180,255,180,0.5)';
          ctx.fillRect(x * CELL + 2, y * CELL + 2, CELL - 6, CELL - 6);
        }
      }
    }
  }

  function countPop() {
    let p = 0;
    for (let i = 0; i < grid.length; i++) p += grid[i];
    return p;
  }

  function updateStats() {
    document.getElementById('gen-count').textContent = generation;
    document.getElementById('pop-count').textContent = countPop();
  }

  // --- Main loop ---
  function loop(ts) {
    requestAnimationFrame(loop);
    if (!running) return;
    const interval = FRAME_MS / speedMult;
    if (ts - lastStep >= interval) {
      lastStep = ts;
      const pop = step();
      render();
      document.getElementById('gen-count').textContent = generation;
      document.getElementById('pop-count').textContent = pop;
    }
  }

  // --- Controls ---
  function togglePlay() {
    running = !running;
    const btn = document.getElementById('btn-play');
    btn.textContent = running ? '❚❚ Pause' : '▶ Play';
    btn.classList.toggle('active', running);
  }

  function setSpeed(s) {
    speedMult = s;
    document.getElementById('speed-display').textContent = s + 'x';
    [1,2,4,8].forEach(n => {
      document.getElementById('spd-' + n).classList.toggle('active', n === s);
    });
  }

  // --- Pointer interaction (mouse + touch unified) ---
  function cellFromPoint(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = Math.floor((clientX - rect.left) * scaleX / CELL);
    const y = Math.floor((clientY - rect.top)  * scaleY / CELL);
    if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return null;
    return { x, y };
  }

  function pointerDown(clientX, clientY) {
    isPointerDown = true;
    const c = cellFromPoint(clientX, clientY);
    if (!c) return;
    drawMode = !grid[idx(c.x, c.y)];
    grid[idx(c.x, c.y)] = drawMode ? 1 : 0;
    updateStats();
    render();
  }

  function pointerMove(clientX, clientY) {
    if (!isPointerDown) return;
    const c = cellFromPoint(clientX, clientY);
    if (!c) return;
    grid[idx(c.x, c.y)] = drawMode ? 1 : 0;
    updateStats();
    render();
  }

  canvas.addEventListener('mousedown',  e => { e.preventDefault(); pointerDown(e.clientX, e.clientY); });
  canvas.addEventListener('mousemove',  e => pointerMove(e.clientX, e.clientY));
  window.addEventListener('mouseup',    () => { isPointerDown = false; });

  canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); pointerMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  canvas.addEventListener('touchend',   () => { isPointerDown = false; });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  });

  // --- Responsive resize ---
  const resizeObserver = new ResizeObserver(() => {
    if (computeLayout()) render();
  });
  resizeObserver.observe(wrapper);

  // --- Kick off ---
  // Initial layout computed via ResizeObserver first tick, then randomize
  requestAnimationFrame(() => {
    computeLayout();
    randomize();
    requestAnimationFrame(loop);
  });
</script>
</body>
</html>
