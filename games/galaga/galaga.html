<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Galaga: Space Defender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @font-face {
            font-family: 'Press Start 2P';
            src: url('fonts/PressStart2P.ttf') format('truetype');
        }

        html, body {
            background: #000;
            overflow: hidden;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Press Start 2P', 'Courier New', monospace;
        }

        #gameContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        canvas#c {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.88);
            z-index: 10;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        #startScreen h1 {
            font-size: clamp(36px, 10vw, 64px);
            color: #ff0;
            text-shadow: 0 0 20px #f80, 0 0 40px #f00, 0 0 60px #f80;
            margin-bottom: 20px;
            letter-spacing: 6px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 20px #f80, 0 0 40px #f00, 0 0 60px #f80; }
            50% { text-shadow: 0 0 30px #ff0, 0 0 60px #f80, 0 0 90px #f00; }
        }

        #startScreen p, #gameOverScreen p {
            font-size: clamp(14px, 4vw, 20px);
            color: #0ff;
            margin-bottom: 10px;
        }

        .btn {
            margin-top: 30px;
            padding: 18px 54px;
            font-size: clamp(14px, 4vw, 24px);
            font-family: 'Press Start 2P', monospace;
            background: transparent;
            color: #0f0;
            border: 2px solid #0f0;
            border-radius: 8px;
            cursor: pointer;
            text-shadow: 0 0 10px #0f0;
            box-shadow: 0 0 15px rgba(0,255,0,0.3), inset 0 0 15px rgba(0,255,0,0.1);
        }

        .coin-slot-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .insert-coin-text {
            color: #ff0;
            font-size: clamp(12px, 3.5vw, 20px);
            animation: blink 1s step-end infinite;
            margin-bottom: 20px;
            text-shadow: 2px 2px #f00;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .coin-slot {
            width: 40px;
            height: 80px;
            background: #222;
            border: 4px solid #555;
            border-radius: 5px;
            position: relative;
            box-shadow: inset 0 0 10px #000, 0 0 10px rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .coin-slot-hole {
            width: 8px;
            height: 50px;
            background: #000;
            border-radius: 4px;
            box-shadow: inset 0 0 5px rgba(255,0,0,0.5);
        }

        .coin {
            position: absolute;
            top: -60px;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #ffd700 30%, #b8860b 80%);
            border-radius: 50%;
            border: 2px solid #daa520;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            color: #b8860b;
        }

        .coin::after {
            content: "25¢";
        }

        .coin.drop {
            animation: coinDrop 0.8s ease-in forwards;
        }

        @keyframes coinDrop {
            0% { top: -60px; opacity: 0; transform: scale(1.5) rotateY(0deg); }
            20% { opacity: 1; }
            60% { top: -20px; transform: scale(1) rotateY(360deg); }
            80% { top: 10px; opacity: 1; }
            100% { top: 40px; opacity: 0; transform: scale(0.8) rotateY(720deg); }
        }

        .btn:active {
            background: rgba(0,255,0,0.15);
        }

        #gameOverScreen h2 {
            font-size: clamp(28px, 9vw, 56px);
            color: #f00;
            text-shadow: 0 0 20px #f00;
            margin-bottom: 10px;
        }

        #gameOverScreen .score-display {
            font-size: clamp(22px, 7vw, 44px);
            color: #ff0;
            margin: 10px 0;
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: clamp(12px, 3.5vw, 18px);
            z-index: 5;
            pointer-events: none;
            padding: calc(env(safe-area-inset-top, 8px) + 6px) 12px 0 12px;
        }

        #hud span {
            text-shadow: 0 0 6px rgba(255,255,255,0.5);
        }

        #lives {
            color: #f44;
            font-size: clamp(32px, 10vw, 56px) !important;
            line-height: 1;
            text-shadow: 0 0 8px rgba(255,50,50,0.7);
            transition: transform 0.15s ease-out, text-shadow 0.15s ease-out;
            display: inline-block;
        }
        #lives.hit {
            transform: scale(2.2);
            text-shadow: 0 0 20px rgba(255,0,0,1), 0 0 40px rgba(255,0,0,0.8), 0 0 60px rgba(255,0,0,0.4);
            animation: hitPulse 0.3s ease-out;
        }
        @keyframes hitPulse {
            0% { transform: scale(3); opacity: 0.5; }
            50% { transform: scale(2.4); opacity: 1; }
            100% { transform: scale(2.2); opacity: 1; }
        }

        #powerUpHud {
            position: absolute;
            top: calc(env(safe-area-inset-top, 8px) + 28px);
            left: 0;
            right: 0;
            text-align: center;
            color: #ff0;
            font-size: clamp(10px, 2.8vw, 14px);
            z-index: 5;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(255,255,0,0.6);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #muteBtn {
            pointer-events: auto;
            cursor: pointer;
            color: #0f0;
            opacity: 0.6;
            transition: opacity 0.2s;
            font-size: clamp(14px, 3.5vw, 20px);
        }
        #muteBtn:active { opacity: 1; }
        #muteBtn.muted { color: #555; }

        #touchZone {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45%;
            z-index: 4;
        }

        #debugPanel {
            position: absolute;
            top: calc(env(safe-area-inset-top, 8px) + 60px);
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #0f0;
            border-radius: 5px;
            padding: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 20;
            color: #ff0;
            font-size: 10px;
            pointer-events: auto;
        }

        #debugPanel button {
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            border-radius: 3px;
            padding: 5px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
        }

        #debugPanel button:active {
            background: #0f0;
            color: #000;
        }

        #debugPowerName {
            min-width: 120px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="c"></canvas>

    <div id="hud">
        <div style="display:flex; flex-direction:column; gap:5px;">
            <span id="scoreHud">SCORE: 0</span>
            <span id="hiScoreHud" style="color: #ff0; font-size: 0.8em;">HI-SCORE: 0</span>
        </div>
        <span id="stageHud">STAGE 1</span>
        <span id="lives">♥♥♥</span>
        <span id="muteBtn">♫</span>
    </div>
    <div id="powerUpHud" aria-hidden="true"></div>
    <div id="specialPowerBtn" style="position: absolute; bottom: 80px; right: 20px; z-index: 20; background: rgba(0,255,255,0.2); border: 2px solid #0ff; color: #0ff; width: 60px; height: 60px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; user-select: none;">⚡</div>

    <div id="debugPanel" style="display: none;">
        <button id="debugPrev">&lt;</button>
        <span id="debugPowerName"></span>
        <button id="debugNext">&gt;</button>
        <button id="debugUse">USE</button>
    </div>

    <div id="touchZone"></div>

    <div id="startScreen">
        <h1>GALAGA</h1>
        <p id="startHiScoreText" style="color: #ff0; font-size: clamp(14px, 4vw, 20px); text-shadow: 0 0 10px #ff0; margin-bottom: 20px;">HI-SCORE: 0</p>
        <p>Drag left/right to move</p>
        <p>Ship auto-fires!</p>
        <p>Grab power-ups for special weapons!</p>
        <div id="shipSelector" style="display:flex; align-items:center; justify-content:center; margin:20px 0; z-index: 20;">
            <button class="btn" id="openCustomizationBtn" style="padding: 15px 30px; font-size: clamp(12px, 3.5vw, 20px);">CUSTOMIZE SHIP</button>
        </div>
        <div class="coin-slot-container" id="startBtn">
            <div class="insert-coin-text">INSERT COIN</div>
            <div class="coin-slot">
                <div class="coin-slot-hole"></div>
            </div>
            <div class="coin" id="coinAnim"></div>
        </div>
    </div>

    <div id="customizationScreen" style="display:none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); z-index: 30; color: #fff; text-align: center; padding: 20px;">
        <h2 style="font-size: clamp(24px, 6vw, 40px); color: #0ff; text-shadow: 0 0 10px #0ff; margin-bottom: 10px;">HANGAR</h2>
        <p id="customHiScoreText" style="color: #ff0; font-size: clamp(14px, 4vw, 20px); text-shadow: 0 0 10px #ff0; margin-bottom: 20px;">HI-SCORE: 0</p>

        <div id="shipGrid" style="display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:20px; margin-bottom: 20px; max-width: 800px; max-height: 50vh; overflow-y: auto;">
        </div>

        <div id="colorPickers" style="display:flex; gap: 30px; margin-bottom: 40px; align-items: center;">
            <div style="display:flex; flex-direction:column; align-items:center; gap: 10px;">
                <label style="font-size: 10px; color: #aaa;">PRIMARY</label>
                <input type="color" id="primaryColorInput" value="#ffffff" style="width: 50px; height: 50px; padding: 0; border: 2px solid #555; border-radius: 5px; cursor: pointer; background: transparent;">
            </div>
            <button class="btn" id="resetColorsBtn" style="font-size: 10px; padding: 8px;">RESET<br>COLORS</button>
            <div style="display:flex; flex-direction:column; align-items:center; gap: 10px;">
                <label style="font-size: 10px; color: #aaa;">SECONDARY</label>
                <input type="color" id="secondaryColorInput" value="#ff0000" style="width: 50px; height: 50px; padding: 0; border: 2px solid #555; border-radius: 5px; cursor: pointer; background: transparent;">
            </div>
        </div>

        <button class="btn" id="closeCustomizationBtn" style="font-size: clamp(12px, 3.5vw, 20px);">BACK TO MENU</button>
    </div>

    <div id="gameOverScreen" style="display:none">
        <h2>GAME OVER</h2>
        <div class="score-display" id="finalScore">0</div>
        <p id="hiScoreText"></p>
        <button class="btn" id="restartBtn">PLAY AGAIN</button>
        <button class="btn" id="changeShipBtn" style="margin-top: 10px; font-size: clamp(12px, 3.5vw, 20px);">CHANGE SHIP</button>
    </div>
</div>

    function renderCustomShipSprite(modelIndex, asShadow = false) {
        let ship = SHIP_MODELS[modelIndex];
        let art = SPRITES[ship.sprite];
        let cols = art[0].length;
        let rows = art.length;
        let c1 = userShipSettings.colors[ship.id].c1;
        let c2 = userShipSettings.colors[ship.id].c2;

        let sc = document.createElement('canvas');
        sc.width = cols;
        sc.height = rows;
        let sctx = sc.getContext('2d');
        sctx.imageSmoothingEnabled = false;

        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                let char = art[y][x];
                let color = SPRITE_PALETTE[char];
                if (char === '1') color = c1;
                else if (char === '2') color = c2;

                if (color) {
                    sctx.fillStyle = asShadow ? '#333333' : color;
                    sctx.fillRect(x, y, 1, 1);
                }
            }
        }
        return { canvas: sc, w: cols, h: rows };
    }

    function initSprites() {
        for (let key in SPRITES) {
            // Skip model rendering here since they need custom color mapping. We do it in renderCustomShipSprite.
            if (key.startsWith('model')) continue;

            let art = SPRITES[key];
            let cols = art[0].length;
            let rows = art.length;

            // Create a small offscreen canvas for crisp nearest-neighbor scaling
            let sc = document.createElement('canvas');
            sc.width = cols;
            sc.height = rows;
            let sctx = sc.getContext('2d');
            sctx.imageSmoothingEnabled = false;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    let char = art[y][x];
                    let color = SPRITE_PALETTE[char];
                    if (color) {
                        sctx.fillStyle = color;
                        sctx.fillRect(x, y, 1, 1);
                    }
                }
            }
            renderedSprites[key] = {
                canvas: sc,
                w: cols,
                h: rows
            };
        }

        // Initial render of the custom ship
        renderedSprites.playerShip = renderCustomShipSprite(userShipSettings.modelIndex);

        playTone(freq, type, duration, volume, startTime) {
            if (!this.ctx) return;

            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type || 'square';
            osc.frequency.setValueAtTime(freq, t);
            gain.gain.setValueAtTime(volume || 0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
            osc.connect(gain);
            gain.connect(this.masterGain);
            osc.start(t);
            osc.stop(t + duration + 0.01);
        },

        playNoise(duration, volume, startTime) {
            if (!this.ctx || !this.noiseBuffer) return;
            const t = startTime || this.ctx.currentTime;
            const noise = this.ctx.createBufferSource();
            noise.buffer = this.noiseBuffer;
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(volume || 0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
            noise.connect(gain);
            gain.connect(this.masterGain);
            noise.start(t);
            noise.stop(t + duration + 0.01);

        // --- BACKGROUND MUSIC (chip-tune arcade) ---

        startMusic() {
            if (!this.ctx) return;
            this.musicPlaying = true;
            this.musicStep = 0;
            this.musicBPM = 140 + Math.min(stage - 1, 15) * 2;
            this.musicNextNoteTime = this.ctx.currentTime + 0.1;
            this.scheduleMusic();
        },

        stopMusic() {
            this.musicPlaying = false;
            if (this.musicTimeout) {
                clearTimeout(this.musicTimeout);
                this.musicTimeout = null;
            }
        },

        scheduleMusic() {
            if (!this.musicPlaying || !this.ctx) return;
            // Update BPM at loop boundaries
            if (this.musicStep === 0) {
                this.musicBPM = 140 + Math.min(stage - 1, 15) * 2;
            }
            const secondsPerBeat = 60 / this.musicBPM;
            const stepDur = secondsPerBeat / 4; // 16th notes

            while (this.musicNextNoteTime < this.ctx.currentTime + 0.1) {
                this.playMusicNote(this.musicStep, this.musicNextNoteTime, stepDur);
                this.musicStep = (this.musicStep + 1) % 64; // 4 bars * 16 steps
                this.musicNextNoteTime += stepDur;
            }
            this.musicTimeout = setTimeout(() => this.scheduleMusic(), 25);
        },

        playMusicNote(step, time, stepDur) {
            const bar = Math.floor(step / 16);
            const beat = step % 16;

            // Chord progression: Am - F - C - G
            const bassFreqs = [110, 87.31, 130.81, 98]; // A2, F2, C3, G2
            const arpSets = [
                [440, 523, 659, 880],  // Am: A4 C5 E5 A5
                [349, 440, 523, 698],  // F:  F4 A4 C5 F5
                [262, 330, 392, 523],  // C:  C4 E4 G4 C5
                [392, 494, 587, 784]   // G:  G4 B4 D5 G5
            ];
            const arpIndices = [0,1,2,3, 2,1,0,1, 2,3,2,1, 0,1,2,3];

            // Bass on beats 0, 4, 8, 12
            if (beat % 4 === 0) {
                this.playTone(bassFreqs[bar], 'square', stepDur * 3.5, 0.03, time);
            }

            // Arpeggio every 16th note
            this.playTone(arpSets[bar][arpIndices[beat]], 'square', stepDur * 0.7, 0.018, time);

            // Hi-hat on even beats
            if (beat % 2 === 0) {
                this.playNoise(0.015, 0.012, time);
            }

            // Kick on 0, 8
            if (beat === 0 || beat === 8) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, time);
                osc.frequency.exponentialRampToValueAtTime(30, time + 0.08);
                gain.gain.setValueAtTime(0.06, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(time);
                osc.stop(time + 0.11);
            }

            // Snare on 4, 12
            if (beat === 4 || beat === 12) {
                this.playNoise(0.05, 0.025, time);
                this.playTone(180, 'triangle', 0.03, 0.02, time);
            }
        }
    };

    function drawShip(x, y, w, h) {
        ctx.save();
        ctx.translate(x, y);

        // Turn off smoothing for pixel art
        ctx.imageSmoothingEnabled = false;

        // Ensure playerShip sprite is rendered if missing
        if (!renderedSprites.playerShip) {
             renderedSprites.playerShip = renderCustomShipSprite(userShipSettings.modelIndex);
        }

        // Draw player sprite
        let sprite = renderedSprites.playerShip;
        if (sprite) {
            ctx.drawImage(sprite.canvas, -w/2, -h/2, w, h);
        }

        // Draw animated flames
        let isMoving = keys && (keys['ArrowLeft'] || keys['a'] || keys['ArrowRight'] || keys['d']);
        let flameKey = (frameCount % 6 < 3) ? 'shipFlame1' : 'shipFlame2';
        let flameSprite = renderedSprites[flameKey];
        if (flameSprite) {
            // Adjust flame size depending on if moving
            let fHeight = isMoving ? h * 0.4 : h * 0.3;
            ctx.drawImage(flameSprite.canvas, -w/2, h/2 - 2, w, fHeight);
        }

        // Shield effect
        if (currentPowerUp === 'shield' && shieldHP > 0) {
            ctx.strokeStyle = `rgba(0,255,0,${0.3 + Math.sin(frameCount * 0.15) * 0.2})`;
            ctx.lineWidth = 2 * scale;
            ctx.beginPath();
            ctx.arc(0, 0, w * 0.85, 0, Math.PI * 2);
            ctx.stroke();
            // second ring
            ctx.strokeStyle = `rgba(0,255,0,${0.15 + Math.sin(frameCount * 0.1 + 1) * 0.1})`;
            ctx.beginPath();
            ctx.arc(0, 0, w * 0.95, 0, Math.PI * 2);
            ctx.stroke();
        }

        ctx.restore();
    }

            draw(x, y, w, h, t) {
                ctx.save(); ctx.translate(x, y);
                ctx.imageSmoothingEnabled = false;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 5 * scale;
                let spriteName = (Math.floor(t / 10) % 2 === 0) ? 'bee1' : 'bee2';
                let sprite = renderedSprites[spriteName];
                if (sprite) ctx.drawImage(sprite.canvas, -w/2, -h/2, w, h);
                ctx.shadowBlur = 0;
                ctx.restore();
            },
            hp: 1, score: 150
        },
        { // Boss
            color: '#0f0',
            draw(x, y, w, h, t) {
                ctx.save(); ctx.translate(x, y);
                let bw = w * 1.3, bh = h * 1.3;
                ctx.imageSmoothingEnabled = false;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 8 * scale;
                let spriteName = (Math.floor(t / 20) % 2 === 0) ? 'boss1' : 'boss2';
                let sprite = renderedSprites[spriteName];
                if (sprite) ctx.drawImage(sprite.canvas, -bw/2, -bh/2, bw, bh);
                ctx.shadowBlur = 0;
                ctx.restore();
            },
            hp: 3, score: 400
        },
        { // Stealth - fades in and out
            color: '#88f',
            draw(x, y, w, h, t) {
                ctx.save(); ctx.translate(x, y);
                let alpha = 0.3 + Math.abs(Math.sin(t * 0.03)) * 0.7;
                ctx.globalAlpha = alpha;
                ctx.imageSmoothingEnabled = false;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 6 * scale;
                let spriteName = (Math.floor(t / 12) % 2 === 0) ? 'stealth1' : 'stealth2';
                let sprite = renderedSprites[spriteName];
                if (sprite) ctx.drawImage(sprite.canvas, -w/2, -h/2, w, h);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
                ctx.restore();
            },
            hp: 1, score: 250
        },
        { // Bomber
            color: '#f80',
            draw(x, y, w, h, t) {
                ctx.save(); ctx.translate(x, y);
                let bw = w * 1.15, bh = h * 1.15;
                ctx.imageSmoothingEnabled = false;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 6 * scale;
                let spriteName = (Math.floor(t / 8) % 2 === 0) ? 'bomber1' : 'bomber2';
                let sprite = renderedSprites[spriteName];
                if (sprite) ctx.drawImage(sprite.canvas, -bw/2, -bh/2, bw, bh);
                ctx.shadowBlur = 0;
                ctx.restore();
            },
            hp: 2, score: 300
        }
    ];

    function spawnWave() {
        enemies = [];
        const rows = Math.min(3 + Math.floor(stage / 2), 5);
        const cols = Math.min(5 + Math.floor(stage / 3), 8);
        const ew = 26 * scale;
        const eh = 24 * scale;
        const maxW = W - 40 * scale;
        const gapX = cols > 1 ? Math.min(ew * 1.8, maxW / (cols - 1)) : 0;
        const gapY = eh * 1.6;
        const startX = W / 2 - (cols - 1) * gapX / 2;
        const startY = 50 * scale + 30;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                let type;
                if (r === 0) {
                    type = 2; // Boss row
                } else if (r === 1) {
                    // Stealth enemies appear from stage 3+, mixed with Bees
                    type = (stage >= 3 && Math.random() < 0.35) ? 3 : 1;
                } else if (r === rows - 1 && stage >= 4) {
                    // Bomber enemies appear in last row from stage 4+
                    type = Math.random() < 0.3 ? 4 : 0;
                } else {
                    type = 0; // Bugs
                }
                const et = ENEMY_TYPES[type];
                enemies.push({
                    x: startX + c * gapX,
                    y: startY + r * gapY,
                    w: ew, h: eh,
                    type,
                    hp: et.hp,
                    homeX: startX + c * gapX,
                    homeY: startY + r * gapY,
                    state: 'formation',
                    diveTimer: 200 + Math.random() * 600,
                    diveProgress: 0,
                    diveStartX: 0,
                    diveStartY: 0,
                    alive: true
                });
            }
        }
    }

    function spawnParticles(x, y, color, count, spread) {
        spread = spread || 6;
        for (let i = 0; i < count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * spread + 1;
            particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 20 + Math.random() * 25,
                maxLife: 45,
                color,
                size: (1.5 + Math.random() * 3) * scale
            });
        }
    }

    function spawnExplosion(x, y, color, size) {
        // Ring of particles
        for (let i = 0; i < 16; i++) {
            let angle = (i / 16) * Math.PI * 2;
            let speed = 3 + Math.random() * 3;
            particles.push({
                x, y,
                vx: Math.cos(angle) * speed * (size || 1),
                vy: Math.sin(angle) * speed * (size || 1),
                life: 30 + Math.random() * 15,
                maxLife: 45,
                color,
                size: (2 + Math.random() * 2) * scale
            });
        }
        // Core flash
        particles.push({
            x, y, vx: 0, vy: 0,
            life: 8, maxLife: 8,
            color: '#fff',
            size: 20 * scale * (size || 1)
        });
        screenShake = Math.max(screenShake, 4 * (size || 1));
    }

    function spawnFloatingText(x, y, text, color) {
        floatingTexts.push({ x, y, text, color, life: 50, maxLife: 50 });
    }

    function dropPowerUp(x, y) {
        // 4% chance to drop a power-up
        if (Math.random() > 0.04) return;
        let type;
        // Supernova is super rare: 1% of drops
        if (Math.random() < 0.01) {
            type = POWERUP_TYPES.find(t => t.id === 'supernova');
        } else {
            let normalTypes = POWERUP_TYPES.filter(t => !t.rare);
            // Common power-ups get extra weight (appear ~3x more often)
            let weightedTypes = [];
            normalTypes.forEach(t => {
                let count = t.common ? 3 : 1;
                for (let i = 0; i < count; i++) weightedTypes.push(t);
            });
            type = weightedTypes[Math.floor(Math.random() * weightedTypes.length)];
        }
        powerUps.push({
            x, y,
            vy: 1.5 * scale,
            type: type.id,
            color: type.color,
            label: type.label,
            icon: type.icon,
            size: 14 * scale,
            bobPhase: Math.random() * Math.PI * 2
        });
    }

    let formationX = 0;
    let formationDir = 1;

    function update() {
        // Hit freeze - brief pause on damage for impact feel
        if (hitFreeze > 0) { hitFreeze--; requestAnimationFrame(update); return; }
        frameCount++;

        // Screen shake decay
        if (screenShake > 0) screenShake *= 0.85;
        if (screenShake < 0.3) screenShake = 0;
        if (invincibleTimer > 0) invincibleTimer--;
        if (damageFlash > 0) damageFlash--;

        // Combo timer
        if (comboTimer > 0) {
            comboTimer--;
            if (comboTimer <= 0) comboCount = 0;
        }

        // Power-up timer
        if (currentPowerUp && currentPowerUp !== 'shield') {
            powerUpTimer--;
            if (powerUpTimer <= 0) {
                if (supernovaActive) supernovaActive = false;
                currentPowerUp = null;
                powerUpHud.style.opacity = '0';
            } else {
                // Flash warning when about to expire
                if (powerUpTimer < 90 && powerUpTimer % 15 < 8) {
                    powerUpHud.style.opacity = '0.4';
                } else {
                    powerUpHud.style.opacity = '1';
                }
            }
        }

        // Stars scroll
        for (let s of stars) {
            s.y += s.speed * scale;
            if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
        }

        // Formation sway
        const maxSway = 30 * scale;
        formationX += formationDir * 0.5 * scale;
        if (Math.abs(formationX) > maxSway) formationDir *= -1;

        // --- ENEMIES ---
        let aliveCount = 0;
        let timeWarpActive = currentPowerUp === 'timewarp';
        let enemySpeedMult = timeWarpActive ? 0.35 : 1;
        for (let e of enemies) {
            if (!e.alive) continue;
            aliveCount++;

            // Freeze countdown
            if (e.frozen && e.frozen > 0) {
                e.frozen--;
                // Frozen enemies don't move or shoot
                if (e.frozen > 0) {
                    // Icy particle effect
                    if (frameCount % 10 === 0) {
                        particles.push({
                            x: e.x + (Math.random() - 0.5) * e.w,
                            y: e.y + (Math.random() - 0.5) * e.h,
                            vx: (Math.random() - 0.5), vy: -Math.random(),
                            life: 15, maxLife: 15, color: '#8ff', size: 2 * scale
                        });
                    }
                    continue;
                }
            }

            if (e.state === 'formation') {
                e.x = e.homeX + formationX;
                e.y = e.homeY + Math.sin(frameCount * 0.02 + e.homeX * 0.01) * 3 * scale;
                e.diveTimer -= enemySpeedMult;
                if (e.diveTimer <= 0 && Math.random() < (0.008 + stage * 0.002) * enemySpeedMult) {
                    e.state = 'diving';
                    e.diveProgress = 0;
                    e.diveStartX = e.x;
                    e.diveStartY = e.y;
                }
                if (Math.random() < (0.001 + stage * 0.0005) * enemySpeedMult) {
                    enemyBullets.push({
                        x: e.x, y: e.y + e.h / 2,
                        vy: (2.5 + stage * 0.2) * scale,
                        vx: (Math.random() - 0.5) * 0.5 * scale
                    });
                }
                // Boss enemies rarely launch homing missiles (stage 2+)
                if (e.type === 2 && stage >= 2 && Math.random() < 0.0004 * stage * enemySpeedMult) {
                    enemyBullets.push({
                        x: e.x, y: e.y + e.h / 2,
                        vy: 2 * scale,
                        vx: 0,
                        homing: true,
                        homingLife: 180,
                        speed: 2.5 * scale
                    });
                }
            } else if (e.state === 'diving') {
                e.diveProgress += (0.012 + stage * 0.0015) * enemySpeedMult;
                e.x = e.diveStartX + Math.sin(e.diveProgress * 3) * 70 * scale;
                e.y = e.diveStartY + e.diveProgress * 280 * scale;
                e.x = Math.max(e.w, Math.min(W - e.w, e.x));
                if (Math.random() < 0.025 * enemySpeedMult) {
                    enemyBullets.push({
                        x: e.x, y: e.y + e.h / 2,
                        vy: 3.5 * scale,
                        vx: (player.x - e.x) * 0.008
                    });
                }
                // Bomber drops cluster bombs while diving
                if (e.type === 4 && Math.random() < 0.04 * enemySpeedMult) {
                    for (let a = -1; a <= 1; a++) {
                        enemyBullets.push({
                            x: e.x + a * 8 * scale,
                            y: e.y + e.h / 2,
                            vy: (2 + Math.random()) * scale,
                            vx: a * 1.5 * scale,
                            cluster: true
                        });
                    }
                }
                if (e.y > H + 50) {
                    e.state = 'returning';
                    e.x = e.homeX + formationX;
                    e.y = -30;
                }
            } else if (e.state === 'returning') {
                e.x += (e.homeX + formationX - e.x) * 0.05;
                e.y += (e.homeY - e.y) * 0.05;
                if (Math.abs(e.y - e.homeY) < 3) {
                    e.state = 'formation';
                    e.diveTimer = 200 + Math.random() * 400;
                }
            }
        }

        // Next stage
        if (aliveCount === 0 && gameRunning) {
            stage++;
            document.getElementById('stageHud').textContent = 'STAGE ' + stage;
            spawnWave();
            spawnFloatingText(W / 2, H / 2, 'STAGE ' + stage, '#ff0');
            Sound.stageClear();
        }

        // --- PLAYER BULLETS ---
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            if (b.drunk) {
                b.drunkPhase += 0.15;
                b.vx = Math.sin(b.drunkPhase) * 4 * scale;
            }
            b.x += (b.vx || 0);
            b.y += (b.vy || -7 * scale);
            // Ricochet: bounce off screen edges
            if (b.ricochet && b.ricochet > 0) {
                if (b.x < 0 || b.x > W) { b.vx = -(b.vx || 0); b.ricochet--; b.x = Math.max(0, Math.min(W, b.x)); }
                if (b.y < 0) { b.vy = -b.vy; b.ricochet--; b.y = Math.max(0, b.y); }
            }
            if (!b.ricochet && (b.y < -10 || b.y > H + 10 || b.x < -10 || b.x > W + 10)) { bullets.splice(i, 1); continue; }
            if (b.ricochet && b.ricochet <= 0 && (b.y < -10 || b.y > H + 10)) { bullets.splice(i, 1); continue; }

            let removed = false;
            for (let e of enemies) {
                if (!e.alive) continue;
                // Stealth enemies can't be hit when mostly invisible
                if (e.type === 3) {
                    let alpha = 0.3 + Math.abs(Math.sin(frameCount * 0.03)) * 0.7;
                    if (alpha < 0.5) continue;
                }
                if (Math.abs(b.x - e.x) < e.w * 0.55 && Math.abs(b.y - e.y) < e.h * 0.55) {
                    if (!b.pierce) {
                        bullets.splice(i, 1);
                        removed = true;
                    }
                    // Freeze bullets freeze enemies
                    if (b.freeze && e.alive) {
                        e.frozen = 180; // 3 seconds frozen
                        spawnParticles(e.x, e.y, '#8ff', 8, 3);
                    }
                    hitEnemy(e);
                    break;
                }
            }
            if (removed) continue;
        }

        // --- LASERS ---
        for (let i = lasers.length - 1; i >= 0; i--) {
            let l = lasers[i];
            l.life--;
            if (l.life <= 0) { lasers.splice(i, 1); continue; }
            // Laser damages all enemies it touches
            for (let e of enemies) {
                if (!e.alive) continue;
                if (Math.abs(l.x - e.x) < l.width / 2 + e.w * 0.4 && e.y < l.y && e.y > 0) {
                    if (frameCount % 3 === 0) { // damage every 3 frames
                        hitEnemy(e);
                    }
                }
            }
        }

        // --- MISSILES ---
        for (let i = missiles.length - 1; i >= 0; i--) {
            let m = missiles[i];
            // Find nearest enemy
            let nearest = null;
            let nearestDist = Infinity;
            for (let e of enemies) {
                if (!e.alive) continue;
                let d = Math.hypot(e.x - m.x, e.y - m.y);
                if (d < nearestDist) { nearestDist = d; nearest = e; }
            }
            if (nearest) {
                let angle = Math.atan2(nearest.y - m.y, nearest.x - m.x);
                let turnSpeed = 0.08;
                let diff = angle - m.angle;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                m.angle += Math.sign(diff) * Math.min(Math.abs(diff), turnSpeed);
            }
            let spd = 5 * scale;
            m.vx = Math.cos(m.angle) * spd;
            m.vy = Math.sin(m.angle) * spd;
            m.x += m.vx;
            m.y += m.vy;
            m.life--;
            // Trail
            if (frameCount % 2 === 0) {
                particles.push({
                    x: m.x, y: m.y,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 1.5 + 1,
                    life: 12, maxLife: 12,
                    color: '#f0f',
                    size: 3 * scale
                });
            }

            if (m.life <= 0 || m.x < -20 || m.x > W + 20 || m.y < -20 || m.y > H + 20) {
                missiles.splice(i, 1); continue;
            }

            for (let e of enemies) {
                if (!e.alive) continue;
                if (Math.abs(m.x - e.x) < e.w * 0.6 && Math.abs(m.y - e.y) < e.h * 0.6) {
                    missiles.splice(i, 1);
                    hitEnemy(e);
                    spawnExplosion(e.x, e.y, '#f0f', 0.7);
                    break;
                }
            }
        }

        // --- BLACK HOLES (MASSIVELY BUFFED) ---
        for (let i = blackHoles.length - 1; i >= 0; i--) {
            let bh = blackHoles[i];
            if (!bh.deployed) {
                bh.y += bh.vy;
                if (bh.y < H * 0.35) { bh.deployed = true; bh.vy = 0; }
            }
            if (bh.deployed) {
                bh.radius = Math.min(bh.radius + 3 * scale, bh.maxRadius);
                // Pull ALL enemies toward center with massive gravity
                for (let e of enemies) {
                    if (!e.alive) continue;
                    let dx = bh.x - e.x, dy = bh.y - e.y;
                    let dist = Math.hypot(dx, dy);
                    let pullRange = bh.maxRadius * 4; // huge pull range
                    if (dist < pullRange && dist > 0) {
                        let ratio = (pullRange - dist) / pullRange;
                        let strength = ratio * ratio * 8 * scale;
                        e.x += (dx / dist) * strength;
                        e.y += (dy / dist) * strength;
                    }
                    // Kill zone - anything near the core gets shredded
                    if (dist < bh.radius * 0.6) {
                        hitEnemy(e);
                        if (frameCount % 4 === 0 && e.alive) hitEnemy(e);
                    }
                }
                // Absorb enemy bullets in wider range
                for (let j = enemyBullets.length - 1; j >= 0; j--) {
                    let eb = enemyBullets[j];
                    let ebDist = Math.hypot(eb.x - bh.x, eb.y - bh.y);
                    if (ebDist < bh.radius * 2) {
                        // Pull bullets toward center too
                        let dx = bh.x - eb.x, dy = bh.y - eb.y;
                        eb.vx = (eb.vx || 0) + (dx / ebDist) * 2;
                        eb.vy += (dy / ebDist) * 2;
                        if (ebDist < bh.radius * 0.5) {
                            enemyBullets.splice(j, 1);
                            spawnParticles(eb.x, eb.y, '#609', 3, 2);
                        }
                    }
                }
                // Ambient particles swirling in
                if (frameCount % 4 === 0) {
                    let angle = Math.random() * Math.PI * 2;
                    let r = bh.radius * (1 + Math.random());
                    particles.push({
                        x: bh.x + Math.cos(angle) * r,
                        y: bh.y + Math.sin(angle) * r,
                        vx: -Math.cos(angle) * 3, vy: -Math.sin(angle) * 3,
                        life: 20, maxLife: 20, color: '#a0f', size: 2 * scale
                    });
                }
            }
            bh.life--;
            if (bh.life <= 0) {
                // Massive collapse explosion
                spawnExplosion(bh.x, bh.y, '#609', 3);
                spawnExplosion(bh.x, bh.y, '#a0f', 2.5);
                screenShake = 12;
                // Kill everything in large radius on collapse
                for (let e of enemies) {
                    if (!e.alive) continue;
                    if (Math.hypot(e.x - bh.x, e.y - bh.y) < bh.maxRadius * 2.5) {
                        hitEnemy(e);
                        if (e.alive) hitEnemy(e); // double damage on collapse
                    }
                }
                // Clear all nearby enemy bullets on collapse
                for (let j = enemyBullets.length - 1; j >= 0; j--) {
                    if (Math.hypot(enemyBullets[j].x - bh.x, enemyBullets[j].y - bh.y) < bh.maxRadius * 2) {
                        enemyBullets.splice(j, 1);
                    }
                }
                blackHoles.splice(i, 1);
            }
        }

        // --- BOOMERANGS ---
        for (let i = boomerangs.length - 1; i >= 0; i--) {
            let bm = boomerangs[i];
            bm.t += 0.02;
            // Elliptical path
            let range = 180 * scale;
            bm.x = bm.startX + Math.sin(bm.t * Math.PI) * range * bm.dir;
            bm.y = bm.startY - Math.sin(bm.t * Math.PI) * range * 1.2;
            // Hit enemies
            for (let e of enemies) {
                if (!e.alive || bm.hit.has(e)) continue;
                if (Math.abs(bm.x - e.x) < e.w * 0.6 + 10 * scale && Math.abs(bm.y - e.y) < e.h * 0.6 + 10 * scale) {
                    bm.hit.add(e);
                    e.hp = 0; // boomerang instantly kills
                    hitEnemy(e);
                    spawnParticles(e.x, e.y, '#f55', 6, 3);
                }
            }
            if (bm.t >= 1) {
                boomerangs.splice(i, 1);
            }
        }

        // --- LIGHTNING BOLTS (visual only) ---
        for (let i = lightningBolts.length - 1; i >= 0; i--) {
            lightningBolts[i].life--;
            if (lightningBolts[i].life <= 0) lightningBolts.splice(i, 1);
        }

        // --- GRAVITY VORTEX on enemy bullets ---
        if (currentPowerUp === 'gravity') {
            gravityFlipped = true;
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let eb = enemyBullets[i];
                let dx = player.x - eb.x;
                let dy = player.y - eb.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                let pullStrength = 4.5 * scale;
                if (dist > 1) {
                    eb.vx = (eb.vx || 0) + (dx / dist) * pullStrength * 0.12;
                    eb.vy += (dy / dist) * pullStrength * 0.12;
                    eb.vx *= 0.94;
                    eb.vy *= 0.94;
                }
                // Destroy bullets that reach the vortex center
                if (dist < 35 * scale) {
                    spawnParticles(eb.x, eb.y, '#fa0', 4, 3);
                    enemyBullets.splice(i, 1);
                }
            }
        } else {
            gravityFlipped = false;
        }

        // --- POWER-UPS ---
        for (let i = powerUps.length - 1; i >= 0; i--) {
            let p = powerUps[i];
            p.y += p.vy;
            p.bobPhase += 0.06;
            if (p.y > H + 20) { powerUps.splice(i, 1); continue; }
            // Collect
            if (Math.abs(p.x - player.x) < player.w * 0.7 + p.size && Math.abs(p.y - player.y) < player.h * 0.7 + p.size) {
                powerUps.splice(i, 1);
                activatePowerUp(p.type, p.label, p.color);
                spawnParticles(p.x, p.y, p.color, 12, 4);
                screenShake = 3;
            }
        }

        // --- ENEMY BULLETS ---
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            let b = enemyBullets[i];
            // Homing missile behavior
            if (b.homing) {
                b.homingLife--;
                if (b.homingLife <= 0) { enemyBullets.splice(i, 1); continue; }
                let angle = Math.atan2(player.y - b.y, player.x - b.x);
                let curAngle = Math.atan2(b.vy, b.vx);
                let diff = angle - curAngle;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                curAngle += Math.sign(diff) * Math.min(Math.abs(diff), 0.04);
                b.vx = Math.cos(curAngle) * b.speed;
                b.vy = Math.sin(curAngle) * b.speed;
                // Trail particles
                if (frameCount % 3 === 0) {
                    particles.push({
                        x: b.x, y: b.y,
                        vx: (Math.random() - 0.5), vy: (Math.random() - 0.5),
                        life: 10, maxLife: 10, color: '#f44', size: 2 * scale
                    });
                }
            }
            b.y += b.vy;
            b.x += (b.vx || 0);
            if (b.y > H + 10 || b.y < -10 || b.x < -10 || b.x > W + 10) { enemyBullets.splice(i, 1); continue; }
            if (Math.abs(b.x - player.x) < player.w * 0.4 && Math.abs(b.y - player.y) < player.h * 0.4 && currentPowerUp !== 'gravity') {
                enemyBullets.splice(i, 1);
                playerHit();
            }
        }

        // --- PLASMA WAVES ---
        for (let i = plasmaWaves.length - 1; i >= 0; i--) {
            let pw = plasmaWaves[i];
            pw.radius += 4 * scale;
            pw.life--;
            // Damage enemies the wave passes through
            for (let e of enemies) {
                if (!e.alive || pw.hit.has(e)) continue;
                let dist = Math.hypot(e.x - pw.x, e.y - pw.y);
                if (Math.abs(dist - pw.radius) < 20 * scale) {
                    pw.hit.add(e);
                    e.hp = 0; // plasma wave instantly kills
                    hitEnemy(e);
                }
            }
            // Destroy enemy bullets in the wave
            for (let j = enemyBullets.length - 1; j >= 0; j--) {
                let eb = enemyBullets[j];
                let dist = Math.hypot(eb.x - pw.x, eb.y - pw.y);
                if (Math.abs(dist - pw.radius) < 15 * scale) {
                    enemyBullets.splice(j, 1);
                }
            }
            if (pw.life <= 0) plasmaWaves.splice(i, 1);
        }

        // --- METEORS ---
        for (let i = meteors.length - 1; i >= 0; i--) {
            let m = meteors[i];
            m.x += m.vx;
            m.y += m.vy;
            m.vy += 0.15 * scale; // gravity
            m.rotation += 0.1;
            // Hit enemies
            for (let e of enemies) {
                if (!e.alive) continue;
                if (Math.hypot(e.x - m.x, e.y - m.y) < (e.w + m.size) * 0.5) {
                    hitEnemy(e);
                    if (e.alive) hitEnemy(e); // meteors hit hard
                    spawnExplosion(m.x, m.y, '#0af', 1);
                    m.life = 0;
                    break;
                }
            }
            m.life--;
            if (m.life <= 0 || m.y > H + 20) {
                if (m.life <= 0) {
                    spawnExplosion(m.x, m.y, '#0af', 0.8);
                    screenShake = 3;
                }
                meteors.splice(i, 1);
            }
            // Trail
            if (frameCount % 2 === 0) {
                particles.push({
                    x: m.x, y: m.y,
                    vx: (Math.random() - 0.5) * 2, vy: -Math.random() * 2,
                    life: 15, maxLife: 15, color: '#0cf', size: 3 * scale
                });
            }
        }

        // --- DRONE SWARM ---
        for (let i = orbitDrones.length - 1; i >= 0; i--) {
            let d = orbitDrones[i];
            // Find target if none or target dead
            if (!d.target || !d.target.alive) {
                let closest = null, bestDist = Infinity;
                for (let e of enemies) {
                    if (!e.alive) continue;
                    let dist = Math.hypot(e.x - d.x, e.y - d.y);
                    if (dist < bestDist) { bestDist = dist; closest = e; }
                }
                d.target = closest;
            }

            // Move towards target or idle around player
            let speed = 7 * scale;
            if (d.target && d.target.alive) {
                let angle = Math.atan2(d.target.y - d.y, d.target.x - d.x);
                d.vx += (Math.cos(angle) * speed - d.vx) * 0.1;
                d.vy += (Math.sin(angle) * speed - d.vy) * 0.1;
            } else {
                let angle = Math.atan2(player.y - 80 * scale - d.y, player.x - d.x);
                d.vx += (Math.cos(angle) * speed * 0.5 - d.vx) * 0.05;
                d.vy += (Math.sin(angle) * speed * 0.5 - d.vy) * 0.05;
            }

            d.x += d.vx;
            d.y += d.vy;

            // Damage and explode on contact
            if (d.target && d.target.alive && Math.hypot(d.target.x - d.x, d.target.y - d.y) < d.target.w * 0.6) {
                d.target.hp = 0; // deadly kamikaze drone
                hitEnemy(d.target);
                spawnExplosion(d.x, d.y, '#bf0', 1);
                d.life = 0; // drone dies on hit
            }

            d.life--;
            if (d.life <= 0) {
                if (d.life === 0) spawnParticles(d.x, d.y, '#bf0', 4, 2);
                orbitDrones.splice(i, 1);
            }
        }

        // --- PHOTON TORPEDOES ---
        for (let i = photonTorpedoes.length - 1; i >= 0; i--) {
            let pt = photonTorpedoes[i];
            pt.y += pt.vy;
            pt.glow = Math.min(pt.glow + 0.5, 20);
            // Trail
            if (frameCount % 2 === 0) {
                particles.push({
                    x: pt.x + (Math.random() - 0.5) * 6, y: pt.y + 5 * scale,
                    vx: (Math.random() - 0.5), vy: Math.random() * 2,
                    life: 12, maxLife: 12, color: '#fa5', size: 3 * scale
                });
            }
            // Hit enemy or reach top -> explode
            let exploded = false;
            for (let e of enemies) {
                if (!e.alive) continue;
                if (Math.hypot(e.x - pt.x, e.y - pt.y) < (e.w + 10) * 0.5) {
                    exploded = true; break;
                }
            }
            if (exploded || pt.y < -10) {
                // AOE explosion
                spawnExplosion(pt.x, pt.y, '#fa5', 2.5);
                spawnExplosion(pt.x, pt.y, '#fff', 1.5);
                screenShake = 8;
                for (let e of enemies) {
                    if (!e.alive) continue;
                    if (Math.hypot(e.x - pt.x, e.y - pt.y) < 120 * scale) {
                        hitEnemy(e);
                        if (e.alive) hitEnemy(e);
                    }
                }
                photonTorpedoes.splice(i, 1);
            }
        }

        // --- VORTEX BEAMS ---
        for (let i = vortexBeams.length - 1; i >= 0; i--) {
            let vb = vortexBeams[i];
            vb.angle += 0.08;
            vb.length = Math.min(vb.length + 30 * scale, H * 2.5); // Extend length quickly across entire map
            vb.life--;
            // Damage enemies along the beam
            let bx = player.x, by = player.y - player.h * 0.5; // Origin at front of ship
            for (let e of enemies) {
                if (!e.alive) continue;
                // Check if enemy is near the spinning beam line
                let beamEndX = bx + Math.cos(vb.angle) * vb.length;
                let beamEndY = by + Math.sin(vb.angle) * vb.length;
                let dx = beamEndX - bx, dy = beamEndY - by;
                let t = Math.max(0, Math.min(1, ((e.x - bx) * dx + (e.y - by) * dy) / (dx * dx + dy * dy)));
                let closestX = bx + t * dx, closestY = by + t * dy;
                if (Math.hypot(e.x - closestX, e.y - closestY) < 25 * scale) {
                    e.hp = 0; // instantly kill anything it touches
                    hitEnemy(e);
                }
            }
            if (vb.life <= 0) vortexBeams.splice(i, 1);
        }

        // --- SUPERNOVA ---
        if (supernovaActive) {
            // Kill any enemy that touches the player
            for (let e of enemies) {
                if (!e.alive) continue;
                if (Math.hypot(e.x - player.x, e.y - player.y) < 50 * scale) {
                    e.hp = 0;
                    hitEnemy(e);
                    spawnExplosion(e.x, e.y, '#ff0', 1.5);
                }
            }
            // Destroy nearby enemy bullets
            for (let j = enemyBullets.length - 1; j >= 0; j--) {
                let eb = enemyBullets[j];
                if (Math.hypot(eb.x - player.x, eb.y - player.y) < 40 * scale) {
                    enemyBullets.splice(j, 1);
                    spawnParticles(eb.x, eb.y, '#ff0', 4, 2);
                }
            }
            // Rainbow trail particles
            if (frameCount % 4 === 0) {
                let hue = (frameCount * 8) % 360;
                particles.push({
                    x: player.x + (Math.random() - 0.5) * 20,
                    y: player.y + (Math.random() - 0.5) * 20,
                    vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4,
                    life: 20, maxLife: 20, color: `hsl(${hue},100%,60%)`, size: 4 * scale
                });
            }
        }

        // --- FREEZE effect ---
        // (handled in enemy movement - enemies don't move when frozen)

        // Enemy-player collision
        for (let e of enemies) {
            if (!e.alive) continue;
            if (Math.abs(e.x - player.x) < (e.w + player.w) * 0.45 && Math.abs(e.y - player.y) < (e.h + player.h) * 0.45) {
                if (supernovaActive) {
                    // Supernova destroys enemies on contact
                    e.hp = 0;
                    hitEnemy(e);
                    spawnExplosion(e.x, e.y, '#ff0', 1.5);
                } else {
                    e.alive = false;
                    spawnExplosion(e.x, e.y, ENEMY_TYPES[e.type].color, 1);
                    playerHit();
                }
            }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.96;
            p.vy *= 0.96;
            p.life--;
            if (p.life <= 0) particles.splice(i, 1);
        }

        // Floating texts
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            let t = floatingTexts[i];
            t.y -= 1;
            t.life--;
            if (t.life <= 0) floatingTexts.splice(i, 1);
        }
    }

    function hitEnemy(e) {
        e.hp--;
        if (e.hp <= 0) {
            e.alive = false;
            let baseScore = ENEMY_TYPES[e.type].score;
            comboCount++;
            comboTimer = 60;
            let multiplier = Math.min(comboCount, 8);
            let pts = baseScore * multiplier;
            score += pts;
            updateScoreHud();
            spawnExplosion(e.x, e.y, ENEMY_TYPES[e.type].color, e.type === 2 ? 1.5 : 1);
            if (multiplier > 1) {
                spawnFloatingText(e.x, e.y - 15, pts + ' x' + multiplier, '#ff0');
            } else {
                spawnFloatingText(e.x, e.y - 15, '+' + pts, '#fff');
            }
            dropPowerUp(e.x, e.y);
            Sound.enemyDeath();
            if (multiplier > 1) Sound.combo(comboCount);
        } else {
            spawnParticles(e.x, e.y, '#fff', 5, 3);
            Sound.enemyHit();
        }
    }

    function activatePowerUp(type, label, color) {
        if (type === 'supernova') Sound.supernovaActivate();
        else Sound.powerUp();
        currentPowerUp = type;
        powerUpTimer = POWERUP_DURATION;
        powerUpHud.textContent = label;
        powerUpHud.style.color = color;
        powerUpHud.style.opacity = '1';
        supernovaActive = false; // reset
        if (type === 'shield') {
            shieldHP = 2;
        } else if (type === 'drones') {
            // Spawn multiple independent hunter-killer drones
            orbitDrones = [];
            for (let i = 0; i < 12; i++) {
                orbitDrones.push({
                    x: player.x + (Math.random() - 0.5) * 40 * scale,
                    y: player.y + (Math.random() - 0.5) * 40 * scale,
                    vx: (Math.random() - 0.5) * 8 * scale,
                    vy: -4 * scale - Math.random() * 4 * scale,
                    life: POWERUP_DURATION * 1.5,
                    target: null
                });
            }
        } else if (type === 'supernova') {
            supernovaActive = true;
            powerUpTimer = 480; // 8 seconds of pure destruction
            screenShake = 15;
            // Big activation explosion
            spawnExplosion(player.x, player.y, '#ff0', 3);
            spawnExplosion(player.x, player.y, '#fff', 2);
            spawnExplosion(player.x, player.y, '#f80', 2.5);
        }
        spawnFloatingText(player.x, player.y - 40, label + '!', color);
    }

    function playerHit() {
        if (supernovaActive) return; // TOTALLY invincible during supernova
        if (invincibleTimer > 0) return;
        if (currentPowerUp === 'shield' && shieldHP > 0) {
            shieldHP--;
            screenShake = 5;
            spawnParticles(player.x, player.y, '#0f0', 10, 5);
            Sound.shieldBlock();
            if (shieldHP <= 0) {
                currentPowerUp = null;
                powerUpHud.style.opacity = '0';
            }
            return;
        }
        if (!isDebugMode) {
            lives--;
        }
        Sound.playerDamage();
        spawnExplosion(player.x, player.y, '#f44', 2.5);
        spawnExplosion(player.x, player.y, '#fff', 1.5);
        screenShake = 35;
        updateLivesHud(true);
        damageFlash = 20;
        hitFreeze = 6;
        if (lives <= 0) {
            gameOver();
        } else {
            player.x = W / 2;
            invincibleTimer = 90; // ~1.5 seconds of invincibility
        }
    }

    function updateLivesHud(wasHit) {
        const el = document.getElementById('lives');
        el.textContent = '♥'.repeat(Math.max(0, lives));
        if (wasHit) {
            el.classList.add('hit');
            setTimeout(() => el.classList.remove('hit'), 300);
        }
    }

// --- SPECIAL POWER LOGIC ---
    function activateSpecialPower() {
        if (!gameRunning || lives <= 0 || specialPowerCooldown > 0) return;

        let ship = SHIP_MODELS[userShipSettings.modelIndex];
        if (ship && ship.powerId) {
            activatePowerUp(ship.powerId, ship.powerName, ship.powerColor);
            specialPowerCooldown = SPECIAL_POWER_MAX_COOLDOWN;
            updateSpecialPowerUI();
        }
    }

    function updateSpecialPowerUI() {
        const btn = document.getElementById('specialPowerBtn');
        if (!gameRunning) {
            btn.style.display = 'none';
            return;
        }

        btn.style.display = 'flex';
        if (specialPowerCooldown > 0) {
            let pct = (specialPowerCooldown / SPECIAL_POWER_MAX_COOLDOWN) * 100;
            btn.style.background = `linear-gradient(to top, rgba(255,0,0,0.3) ${pct}%, rgba(0,0,0,0) ${pct}%)`;
            btn.style.borderColor = '#f00';
            btn.style.color = '#f00';
            btn.style.fontSize = '20px';
            btn.textContent = Math.ceil(specialPowerCooldown / 1000);
        } else {
            btn.style.background = 'rgba(0,255,255,0.2)';
            btn.style.borderColor = '#0ff';
            btn.style.color = '#0ff';
            btn.style.fontSize = '24px';
            btn.textContent = '⚡';
        }
    }

    document.getElementById('specialPowerBtn').addEventListener('click', function(e) {
        e.preventDefault();
        activateSpecialPower();
    });
    document.getElementById('specialPowerBtn').addEventListener('touchstart', function(e) {
        e.preventDefault();
        activateSpecialPower();
    }, { passive: false });

    // --- FIRE LOGIC ---
    function fire() {
        let now = Date.now();
        let rate = (currentPowerUp === 'minigun') ? FIRE_RATE * 0.25 : FIRE_RATE;
        if (now - lastFireTime < rate) return;
        lastFireTime = now;

        if (currentPowerUp === 'spread') {
            // 3-way spread
            for (let a = -1; a <= 1; a++) {
                let angle = -Math.PI / 2 + a * 0.22;
                bullets.push({
                    x: player.x,
                    y: player.y - player.h * 0.5,
                    vx: Math.cos(angle) * 7 * scale,
                    vy: Math.sin(angle) * 7 * scale
                });
            }
        } else if (currentPowerUp === 'laser') {
            // Big continuous laser beam
            lasers.push({
                x: player.x,
                y: player.y,
                width: 18 * scale,
                life: 8
            });
        } else if (currentPowerUp === 'missile') {
            // Fire two homing missiles
            for (let side of [-1, 1]) {
                missiles.push({
                    x: player.x + side * player.w * 0.3,
                    y: player.y - player.h * 0.3,
                    vx: side * 1.5 * scale,
                    vy: -3 * scale,
                    angle: -Math.PI / 2 + side * 0.3,
                    life: 120
                });
            }
        } else if (currentPowerUp === 'pierce') {
            // Piercing shot - single powerful bullet that passes through enemies
            bullets.push({
                x: player.x,
                y: player.y - player.h * 0.5,
                vy: -9 * scale,
                pierce: true
            });
        } else if (currentPowerUp === 'blackhole') {
            blackHoles.push({
                x: player.x, y: player.y - player.h, vy: -4 * scale, radius: 0, life: 180
            });
            currentPowerUp = null; // one shot use
        } else if (currentPowerUp === 'plasma') {
            plasmaWaves.push({
                x: player.x, y: player.y - player.h, vy: -6 * scale, width: 40 * scale, life: 60
            });
        } else if (currentPowerUp === 'meteor') {
            for(let i=0; i<3; i++) {
                meteors.push({
                    x: Math.random() * W, y: -20, vy: 5 * scale + Math.random() * 5 * scale, size: 10 + Math.random()*15, life: 200
                });
            }
            currentPowerUp = null; // One shot use
        } else if (currentPowerUp === 'freeze') {
            // Freeze ray
            lasers.push({
                x: player.x,
                y: player.y,
                width: 25 * scale,
                life: 10,
                freeze: true
            });
        } else if (currentPowerUp === 'timewarp') {
            // Normal shot while time warp is active (slow effect handled in update)
            bullets.push({
                x: player.x - 5 * scale,
                y: player.y - player.h * 0.5,
                vy: -8 * scale
            });
            bullets.push({
                x: player.x + 5 * scale,
                y: player.y - player.h * 0.5,
                vy: -8 * scale
            });
        } else if (currentPowerUp === 'blackhole') {
            // Launch a black hole projectile that sucks enemies in
            blackHoles.push({
                x: player.x,
                y: player.y - player.h * 0.5,
                vy: -5 * scale,
                life: 300,
                radius: 0,
                maxRadius: 100 * scale,
                deployed: false
            });
        } else if (currentPowerUp === 'boomerang') {
            // Fire a boomerang that curves out and comes back
            boomerangs.push({
                x: player.x,
                y: player.y - player.h * 0.5,
                startX: player.x,
                startY: player.y,
                t: 0,
                dir: (Math.random() < 0.5) ? -1 : 1,
                hit: new Set()
            });
        } else if (currentPowerUp === 'drunk') {
            // Fire wobbly zigzag bullets
            for (let i = 0; i < 3; i++) {
                bullets.push({
                    x: player.x + (i - 1) * 10 * scale,
                    y: player.y - player.h * 0.5,
                    vy: -7 * scale,
                    vx: 0,
                    drunk: true,
                    drunkPhase: Math.random() * Math.PI * 2,
                    pierce: true
                });
            }
        } else if (currentPowerUp === 'lightning') {
            // Zap a chain of enemies
            let targets = [];
            let remaining = enemies.filter(e => e.alive);
            if (remaining.length > 0) {
                let current = remaining.reduce((closest, e) => {
                    let d = Math.hypot(e.x - player.x, e.y - player.y);
                    let dc = Math.hypot(closest.x - player.x, closest.y - player.y);
                    return d < dc ? e : closest;
                }, remaining[0]);
                let used = new Set();
                for (let chain = 0; chain < 5 && current; chain++) {
                    targets.push({ x: current.x, y: current.y });
                    current.hp -= 1;
                    if (current.hp <= 0) {
                        current.alive = false;
                        score += ENEMY_TYPES[current.type].score;
                        updateScoreHud();
                        spawnExplosion(current.x, current.y, ENEMY_TYPES[current.type].color, 1);
                        dropPowerUp(current.x, current.y);
                    }
                    used.add(current);
                    let next = null, bestDist = Infinity;
                    for (let e of remaining) {
                        if (!e.alive || used.has(e)) continue;
                        let d = Math.hypot(e.x - current.x, e.y - current.y);
                        if (d < bestDist && d < 150 * scale) { bestDist = d; next = e; }
                    }
                    current = next;
                }
                if (targets.length > 0) {
                    lightningBolts.push({
                        points: [{ x: player.x, y: player.y - player.h * 0.5 }, ...targets],
                        life: 12
                    });
                    screenShake = 4;
                }
            }
        } else if (currentPowerUp === 'gravity') {
            // Shoot upward and downward simultaneously
            bullets.push({
                x: player.x,
                y: player.y - player.h * 0.5,
                vy: -9 * scale
            });
            bullets.push({
                x: player.x - 12 * scale,
                y: player.y - player.h * 0.5,
                vx: -3 * scale,
                vy: -7 * scale
            });
            bullets.push({
                x: player.x + 12 * scale,
                y: player.y - player.h * 0.5,
                vx: 3 * scale,
                vy: -7 * scale
            });
            // Gravity pulls enemy bullets down faster (handled in update)
        } else if (currentPowerUp === 'minigun') {
            // Rapid inaccurate spray
            minigunAngle += 0.15;
            let spread = Math.sin(minigunAngle) * 0.3;
            bullets.push({
                x: player.x,
                y: player.y - player.h * 0.5,
                vx: Math.sin(spread) * 10 * scale,
                vy: -Math.cos(spread) * 10 * scale
            });
        } else if (currentPowerUp === 'plasma') {
            // Expanding plasma wave ring from player
            plasmaWaves.push({
                x: player.x,
                y: player.y - player.h * 0.5,
                radius: 5 * scale,
                life: 60,
                hit: new Set()
            });
        } else if (currentPowerUp === 'meteor') {
            // Rain meteors from the top of the screen
            for (let i = 0; i < 3; i++) {
                meteors.push({
                    x: player.x + (Math.random() - 0.5) * W * 0.6,
                    y: -20,
                    vx: (Math.random() - 0.5) * 3 * scale,
                    vy: 4 * scale + Math.random() * 3 * scale,
                    size: 12 * scale,
                    rotation: Math.random() * Math.PI * 2,
                    life: 120
                });
            }
        } else if (currentPowerUp === 'freeze') {
            // Freeze ray - shoot a beam that freezes enemies
            bullets.push({
                x: player.x,
                y: player.y - player.h * 0.5,
                vy: -10 * scale,
                freeze: true
            });
        } else if (currentPowerUp === 'ricochet') {
            // Ricochet bullet that bounces off walls
            bullets.push({
                x: player.x,
                y: player.y - player.h * 0.5,
                vx: (Math.random() - 0.5) * 4 * scale,
                vy: -8 * scale,
                ricochet: 5, // bounces remaining
                pierce: true
            });
        } else if (currentPowerUp === 'drones') {
            // Normal shot while drones auto-fire
            bullets.push({
                x: player.x,
                y: player.y - player.h * 0.5,
                vy: -8 * scale
            });
        } else if (currentPowerUp === 'vortex') {
            // Spinning beam of death
            if (vortexBeams.length === 0) {
                vortexBeams.push({
                    angle: -Math.PI / 2,
                    length: 20 * scale,
                    life: 90
                });
            }
        } else if (currentPowerUp === 'photon') {
            // Slow, devastating photon torpedo
            photonTorpedoes.push({
                x: player.x,
                y: player.y - player.h * 0.5,
                vy: -3 * scale,
                glow: 0
            });
        } else if (currentPowerUp === 'supernova') {
            // During supernova, fire massive rainbow spread
            for (let a = -2; a <= 2; a++) {
                let angle = -Math.PI / 2 + a * 0.18;
                let hue = (frameCount * 8 + a * 60) % 360;
                bullets.push({
                    x: player.x,
                    y: player.y - player.h * 0.5,
                    vx: Math.cos(angle) * 9 * scale,
                    vy: Math.sin(angle) * 9 * scale,
                    supernova: true,
                    pierce: true
                });
            }
        } else if (currentPowerUp === 'dualshot') {
            // Dual shot power-up
            bullets.push({
                x: player.x - 5 * scale,
                y: player.y - player.h * 0.5,
                vy: -8 * scale
            });
            bullets.push({
                x: player.x + 5 * scale,
                y: player.y - player.h * 0.5,
                vy: -8 * scale
            });
        } else {
            // Normal single shot
            bullets.push({
                x: player.x,
                y: player.y - player.h * 0.5,
                vy: -8 * scale
            });
        }

        // Play appropriate shoot sound
        switch (currentPowerUp) {
            case 'laser': Sound.shootLaser(); break;
            case 'missile': case 'photon': case 'blackhole': case 'meteor': Sound.shootHeavy(); break;
            case 'spread': case 'supernova': Sound.shootSpread(); break;
            case 'lightning': Sound.shootZap(); break;
            default: Sound.shoot(); break;
        }
    }

    // --- DRAW ---
    function draw() {
        ctx.save();

        // Screen shake
        if (screenShake > 0) {
            ctx.translate(
                (Math.random() - 0.5) * screenShake * 2,
                (Math.random() - 0.5) * screenShake * 2
            );
        }

        // Background - deep space gradient
        let bgGrd = ctx.createLinearGradient(0, 0, 0, H);
        bgGrd.addColorStop(0, '#050510');
        bgGrd.addColorStop(0.5, '#0a0a20');
        bgGrd.addColorStop(1, '#080818');
        ctx.fillStyle = bgGrd;
        ctx.fillRect(-5, -5, W + 10, H + 10);

        // Stars
        for (let s of stars) {
            let alpha = 0.3 + Math.sin(frameCount * 0.025 + s.x * 0.1) * 0.3;
            let sz = s.s * scale;
            if (sz > 1.5 * scale) {
                // Bigger stars have a glow
                ctx.fillStyle = `hsla(${s.hue}, 60%, 80%, ${alpha * 0.3})`;
                ctx.fillRect(s.x - sz, s.y - sz, sz * 3, sz * 3);
            }
            ctx.fillStyle = `hsla(${s.hue}, 40%, 90%, ${alpha})`;
            ctx.fillRect(s.x, s.y, sz, sz);
        }

        // Time warp visual overlay
        if (currentPowerUp === 'timewarp') {
            ctx.fillStyle = `rgba(100,0,200,${0.06 + Math.sin(frameCount * 0.05) * 0.03})`;
            ctx.fillRect(-5, -5, W + 10, H + 10);
        }

        // Lasers (draw behind everything)
        for (let l of lasers) {
            let alpha = l.life / 8;
            // Outer glow
            let lgrd = ctx.createLinearGradient(l.x - l.width, 0, l.x + l.width, 0);
            lgrd.addColorStop(0, `rgba(0,255,255,0)`);
            lgrd.addColorStop(0.3, `rgba(0,255,255,${alpha * 0.3})`);
            lgrd.addColorStop(0.5, `rgba(255,255,255,${alpha * 0.8})`);
            lgrd.addColorStop(0.7, `rgba(0,255,255,${alpha * 0.3})`);
            lgrd.addColorStop(1, `rgba(0,255,255,0)`);
            ctx.fillStyle = lgrd;
            ctx.fillRect(l.x - l.width * 1.5, 0, l.width * 3, l.y);
            // Inner core
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.fillRect(l.x - l.width * 0.3, 0, l.width * 0.6, l.y);
        }

        // Player
        if (gameRunning && lives > 0) {
            if (invincibleTimer > 0) {
                ctx.globalAlpha = (Math.floor(invincibleTimer / 4) % 2) ? 1.0 : 0.25;
            }
            drawShip(player.x, player.y, player.w, player.h);
            ctx.globalAlpha = 1;
        }

        // Player bullets
        for (let b of bullets) {
            ctx.imageSmoothingEnabled = false;
            if (b.supernova) {
                let hue = (frameCount * 10 + b.x * 0.5) % 360;
                ctx.fillStyle = `hsl(${hue},100%,60%)`;
                ctx.fillRect(b.x - 5 * scale, b.y - 5 * scale, 10 * scale, 10 * scale);
                ctx.fillStyle = '#fff';
                ctx.fillRect(b.x - 2 * scale, b.y - 2 * scale, 4 * scale, 4 * scale);
            } else if (b.freeze) {
                ctx.fillStyle = '#8ff';
                ctx.fillRect(b.x - 2 * scale, b.y - 8 * scale, 4 * scale, 16 * scale);
                ctx.fillStyle = '#fff';
                ctx.fillRect(b.x - 1 * scale, b.y - 6 * scale, 2 * scale, 12 * scale);
            } else if (b.ricochet) {
                ctx.fillStyle = '#ef0';
                ctx.fillRect(b.x - 4 * scale, b.y - 4 * scale, 8 * scale, 8 * scale);
                ctx.fillStyle = '#fff';
                ctx.fillRect(b.x - 2 * scale, b.y - 2 * scale, 4 * scale, 4 * scale);
            } else if (b.drone) {
                ctx.fillStyle = '#bf0';
                ctx.fillRect(b.x - 3 * scale, b.y - 3 * scale, 6 * scale, 6 * scale);
            } else if (b.drunk) {
                ctx.fillStyle = '#5f5';
                ctx.fillRect(b.x - 4 * scale, b.y - 4 * scale, 8 * scale, 8 * scale);
                ctx.fillStyle = '#fff';
                ctx.fillRect(b.x - 1.5 * scale, b.y - 1.5 * scale, 3 * scale, 3 * scale);
            } else if (b.pierce) {
                ctx.fillStyle = '#ff4';
                ctx.fillRect(b.x - 3 * scale, b.y - 10 * scale, 6 * scale, 20 * scale);
                ctx.fillStyle = '#fff';
                ctx.fillRect(b.x - 1.5 * scale, b.y - 8 * scale, 3 * scale, 16 * scale);
            } else {
                ctx.fillStyle = '#ff0';
                ctx.fillRect(b.x - 2 * scale, b.y - 7 * scale, 4 * scale, 14 * scale);
                ctx.fillStyle = '#fff';
                ctx.fillRect(b.x - 1 * scale, b.y - 5 * scale, 2 * scale, 10 * scale);
            }
        }

        // Missiles
        for (let m of missiles) {
            ctx.save();
            ctx.translate(m.x, m.y);
            ctx.rotate(m.angle + Math.PI / 2);
            // Body
            ctx.fillStyle = '#f0f';
            ctx.beginPath();
            ctx.moveTo(0, -8 * scale);
            ctx.lineTo(-3 * scale, 5 * scale);
            ctx.lineTo(3 * scale, 5 * scale);
            ctx.closePath();
            ctx.fill();
            // Fins
            ctx.fillStyle = '#a0a';
            ctx.beginPath();
            ctx.moveTo(-3 * scale, 3 * scale);
            ctx.lineTo(-6 * scale, 7 * scale);
            ctx.lineTo(-2 * scale, 5 * scale);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(3 * scale, 3 * scale);
            ctx.lineTo(6 * scale, 7 * scale);
            ctx.lineTo(2 * scale, 5 * scale);
            ctx.closePath();
            ctx.fill();
            // Tip glow
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, -6 * scale, 1.5 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // Black holes
        for (let bh of blackHoles) {
            ctx.save();
            let alpha = Math.min(bh.life / 30, 1);
            // Swirling accretion disk
            for (let ring = 3; ring >= 0; ring--) {
                let r = bh.radius * (0.5 + ring * 0.4);
                ctx.beginPath();
                ctx.arc(bh.x, bh.y, r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${80 + ring * 30},0,${120 + ring * 30},${alpha * 0.15})`;
                ctx.fill();
            }
            // Spinning lines
            for (let s = 0; s < 6; s++) {
                let a = frameCount * 0.05 + s * Math.PI / 3;
                ctx.beginPath();
                ctx.moveTo(bh.x, bh.y);
                ctx.lineTo(bh.x + Math.cos(a) * bh.radius, bh.y + Math.sin(a) * bh.radius);
                ctx.strokeStyle = `rgba(160,0,255,${alpha * 0.5})`;
                ctx.lineWidth = 2 * scale;
                ctx.stroke();
            }
            // Core
            ctx.beginPath();
            ctx.arc(bh.x, bh.y, 6 * scale, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,0,0,${alpha})`;
            ctx.fill();
            ctx.beginPath();
