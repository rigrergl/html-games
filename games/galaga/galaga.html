            ctx.arc(bh.x, bh.y, 8 * scale, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(160,0,255,${alpha * 0.8})`;
            ctx.lineWidth = 2 * scale;
            ctx.stroke();
            ctx.restore();
        }

        // Boomerangs
        for (let bm of boomerangs) {
            ctx.save();
            ctx.translate(bm.x, bm.y);
            ctx.rotate(bm.t * Math.PI * 6); // spinning
            ctx.fillStyle = '#f55';
            ctx.beginPath();
            ctx.moveTo(0, -10 * scale);
            ctx.quadraticCurveTo(12 * scale, 0, 0, 4 * scale);
            ctx.quadraticCurveTo(-12 * scale, 0, 0, -10 * scale);
            ctx.fill();
            ctx.fillStyle = '#faa';
            ctx.beginPath();
            ctx.arc(0, -3 * scale, 2 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // Lightning bolts
        for (let lb of lightningBolts) {
            let alpha = lb.life / 12;
            ctx.save();
            ctx.strokeStyle = `rgba(170,238,255,${alpha})`;
            ctx.lineWidth = 3 * scale;
            ctx.shadowColor = '#aef';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            for (let p = 0; p < lb.points.length; p++) {
                let pt = lb.points[p];
                if (p === 0) ctx.moveTo(pt.x, pt.y);
                else {
                    // Jagged lightning segments
                    let prev = lb.points[p - 1];
                    let mx = (prev.x + pt.x) / 2 + (Math.random() - 0.5) * 20 * scale;
                    let my = (prev.y + pt.y) / 2 + (Math.random() - 0.5) * 20 * scale;
                    ctx.lineTo(mx, my);
                    ctx.lineTo(pt.x, pt.y);
                }
            }
            ctx.stroke();
            // Bright core
            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.8})`;
            ctx.lineWidth = 1.5 * scale;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        // Gravity vortex overlay + swirl around player
        if (currentPowerUp === 'gravity') {
            ctx.fillStyle = `rgba(255,160,0,${0.04 + Math.sin(frameCount * 0.08) * 0.02})`;
            ctx.fillRect(-5, -5, W + 10, H + 10);
            // Vortex rings
            for (let r = 0; r < 3; r++) {
                let radius = (50 + r * 35 + Math.sin(frameCount * 0.06 + r) * 10) * scale;
                let alpha = 0.25 - r * 0.07;
                ctx.beginPath();
                ctx.arc(player.x, player.y, radius, frameCount * 0.04 + r, frameCount * 0.04 + r + 4.5);
                ctx.strokeStyle = `rgba(255,160,0,${alpha})`;
                ctx.lineWidth = (3 - r) * scale;
                ctx.shadowColor = '#fa0';
                ctx.shadowBlur = 12;
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }

        // Plasma waves
        for (let pw of plasmaWaves) {
            let alpha = pw.life / 60;
            ctx.beginPath();
            ctx.arc(pw.x, pw.y, pw.radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0,238,255,${alpha * 0.8})`;
            ctx.lineWidth = 5 * scale;
            ctx.stroke();
            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.5})`;
            ctx.lineWidth = 2 * scale;
            ctx.stroke();
        }

        // Meteors
        for (let m of meteors) {
            ctx.save();
            ctx.translate(m.x, m.y);
            ctx.rotate(m.rotation);
            ctx.fillStyle = '#08d';
            ctx.beginPath();
            // Jagged rock shape
            for (let k = 0; k < 7; k++) {
                let a = (k / 7) * Math.PI * 2;
                let r = m.size * (0.7 + Math.sin(k * 3.7) * 0.3);
                if (k === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
            }
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#0ef';
            ctx.beginPath();
            ctx.arc(0, 0, m.size * 0.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // Drone swarm
        for (let d of orbitDrones) {
            ctx.save();
            ctx.translate(d.x, d.y);
            ctx.rotate(Math.atan2(d.vy, d.vx) + Math.PI / 2);
            ctx.fillStyle = '#bf0';
            // Aggressive triangular drone
            ctx.beginPath();
            ctx.moveTo(0, -8 * scale);
            ctx.lineTo(5 * scale, 6 * scale);
            ctx.lineTo(0, 3 * scale);
            ctx.lineTo(-5 * scale, 6 * scale);
            ctx.closePath();
            ctx.fill();
            // Engine glow
            ctx.fillStyle = '#ff0';
            ctx.fillRect(-2 * scale, 4 * scale, 4 * scale, 4 * scale);
            ctx.restore();
        }

        // Photon torpedoes
        for (let pt of photonTorpedoes) {
            ctx.fillStyle = '#fa5';
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 7 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 3 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = `rgba(255,170,80,${0.5 + Math.sin(frameCount * 0.2) * 0.3})`;
            ctx.lineWidth = 2 * scale;
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 10 * scale + Math.sin(frameCount * 0.15) * 3 * scale, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Vortex beams
        for (let vb of vortexBeams) {
            let alpha = Math.min(vb.life / 15, 1);
            let bx = player.x, by = player.y - player.h * 0.5; // match updated collision origin
            let endX = bx + Math.cos(vb.angle) * vb.length;
            let endY = by + Math.sin(vb.angle) * vb.length;
            ctx.save();
            ctx.strokeStyle = `rgba(255,0,170,${alpha * 0.4})`;
            ctx.lineWidth = 20 * scale;
            ctx.beginPath();
            ctx.moveTo(bx, by);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            ctx.strokeStyle = `rgba(255,100,200,${alpha * 0.8})`;
            ctx.lineWidth = 6 * scale;
            ctx.stroke();
            ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
            ctx.lineWidth = 2 * scale;
            ctx.stroke();
            ctx.restore();
        }

        // Supernova aura around player
        if (supernovaActive) {
            let hue = (frameCount * 6) % 360;
            let pulseR = 35 * scale + Math.sin(frameCount * 0.15) * 8 * scale;
            ctx.save();
            ctx.strokeStyle = `hsl(${hue},100%,60%)`;
            ctx.lineWidth = 4 * scale;
            ctx.beginPath();
            ctx.arc(player.x, player.y, pulseR, 0, Math.PI * 2);
            ctx.stroke();
            ctx.strokeStyle = `hsl(${(hue + 120) % 360},100%,70%)`;
            ctx.lineWidth = 2 * scale;
            ctx.beginPath();
            ctx.arc(player.x, player.y, pulseR + 8 * scale, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = `hsla(${hue},100%,50%,0.03)`;
            ctx.fillRect(-5, -5, W + 10, H + 10);
            ctx.restore();
        }

        // Freeze overlay
        if (currentPowerUp === 'freeze') {
            ctx.fillStyle = `rgba(136,255,255,${0.03 + Math.sin(frameCount * 0.06) * 0.01})`;
            ctx.fillRect(-5, -5, W + 10, H + 10);
        }

        // Frozen enemy tint
        for (let e of enemies) {
            if (!e.alive || !e.frozen || e.frozen <= 0) continue;
            ctx.fillStyle = `rgba(136,255,255,0.3)`;
            ctx.fillRect(e.x - e.w * 0.5, e.y - e.h * 0.5, e.w, e.h);
        }

        // Enemies
        for (let e of enemies) {
            if (!e.alive) continue;
            ENEMY_TYPES[e.type].draw(e.x, e.y, e.w, e.h, frameCount);
        }

        // Enemy bullets
        for (let b of enemyBullets) {
            ctx.imageSmoothingEnabled = false;
            if (b.homing) {
                ctx.save();
                ctx.translate(b.x, b.y);
                let ang = Math.atan2(b.vy, b.vx) + Math.PI / 2;
                ctx.rotate(ang);
                ctx.fillStyle = '#f40';
                ctx.beginPath();
                ctx.moveTo(0, -7 * scale);
                ctx.lineTo(-4 * scale, 5 * scale);
                ctx.lineTo(4 * scale, 5 * scale);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#ff0';
                ctx.fillRect(-1.5 * scale, -5.5 * scale, 3 * scale, 3 * scale);
                ctx.restore();
            } else if (b.cluster) {
                ctx.fillStyle = '#f80';
                ctx.save();
                ctx.translate(b.x, b.y);
                ctx.rotate(frameCount * 0.1);
                ctx.fillRect(-3 * scale, -3 * scale, 6 * scale, 6 * scale);
                ctx.restore();
            } else {
                ctx.fillStyle = '#f44';
                ctx.fillRect(b.x - 3.5 * scale, b.y - 3.5 * scale, 7 * scale, 7 * scale);
                ctx.fillStyle = '#faa';
                ctx.fillRect(b.x - 1.5 * scale, b.y - 1.5 * scale, 3 * scale, 3 * scale);
            }
        }

        // Power-ups
        for (let p of powerUps) {
            let bob = Math.sin(p.bobPhase) * 4 * scale;
            let py = p.y + bob;
            // Glow
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 12;
            // Rotating diamond shape
            ctx.save();
            ctx.translate(p.x, py);
            ctx.rotate(frameCount * 0.04);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.moveTo(0, -p.size);
            ctx.lineTo(p.size, 0);
            ctx.lineTo(0, p.size);
            ctx.lineTo(-p.size, 0);
            ctx.closePath();
            ctx.fill();
            // Icon letter
            ctx.rotate(-frameCount * 0.04);
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${p.size * 1.1}px monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(p.icon, 0, 1);
            ctx.restore();
            ctx.shadowBlur = 0;
        }

        // Particles
        for (let p of particles) {
            let alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            if (p.size > 10 * scale) {
                // Big flash particle
                let grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                grd.addColorStop(0, 'rgba(255,255,255,' + alpha + ')');
                grd.addColorStop(0.5, p.color);
                grd.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grd;
                ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
            } else {
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            }
        }
        ctx.globalAlpha = 1;

        // Floating texts
        for (let t of floatingTexts) {
            let alpha = t.life / t.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = t.color;
            ctx.font = `bold ${clamp(14 * scale, 12, 24)}px monospace`;
            ctx.textAlign = 'center';
            ctx.fillText(t.text, t.x, t.y);
        }
        ctx.globalAlpha = 1;

        // Damage flash overlay - dramatic white-to-red flash with vignette
        if (damageFlash > 0) {
            let t = damageFlash / 20;
            // White flash in first frames, then red
            if (damageFlash > 15) {
                ctx.fillStyle = `rgba(255,255,255,${(damageFlash - 15) / 10})`;
                ctx.fillRect(0, 0, W, H);
            }
            ctx.fillStyle = `rgba(255,0,0,${t * 0.5})`;
            ctx.fillRect(0, 0, W, H);
            // Red vignette border
            let grd = ctx.createRadialGradient(W/2, H/2, W*0.2, W/2, H/2, W*0.8);
            grd.addColorStop(0, 'rgba(255,0,0,0)');
            grd.addColorStop(1, `rgba(255,0,0,${t * 0.7})`);
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, W, H);
        }

        // Drag zone hint line
        if (gameRunning) {
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.setLineDash([4, 10]);
            ctx.beginPath();
            ctx.moveTo(0, H * 0.55);
            ctx.lineTo(W, H * 0.55);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        ctx.restore();
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function gameLoop() {
        if (!gameRunning) return;
        update();
        draw();
        animId = requestAnimationFrame(gameLoop);
    }

    function startGame() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameOverScreen').style.display = 'none';
        score = 0;
        lives = 3;
        stage = 1;
        bullets = [];
        enemyBullets = [];
        particles = [];
        powerUps = [];
        lasers = [];
        missiles = [];
        blackHoles = [];
        boomerangs = [];
        lightningBolts = [];
        gravityFlipped = false;
        minigunAngle = 0;
        floatingTexts = [];
        plasmaWaves = [];
        meteors = [];
        orbitDrones = [];
        photonTorpedoes = [];
        supernovaActive = false;
        vortexBeams = [];
        formationX = 0;
        frameCount = 0;
        currentPowerUp = null;
        powerUpTimer = 0;
        shieldHP = 0;
        comboCount = 0;
        comboTimer = 0;
        screenShake = 0;
        invincibleTimer = 0;
        damageFlash = 0;
        player.x = W / 2;
        player.y = H - 100 * scale;
        powerUpHud.style.opacity = '0';
        specialPowerCooldown = 0;
        updateScoreHud();
        document.getElementById('stageHud').textContent = 'STAGE 1';
        updateLivesHud();
        spawnWave();
        gameRunning = true;
        updateSpecialPowerUI();

        if (autoFireInterval) clearInterval(autoFireInterval);
        autoFireInterval = setInterval(() => {
            if (gameRunning) fire();
        }, FIRE_RATE);

        Sound.resume();
        Sound.startMusic();
        gameLoop();
    }

function gameOver() {
        gameRunning = false;
        document.getElementById('specialPowerBtn').style.display = 'none';
        Sound.stopMusic();
        Sound.gameOverSound();
        if (autoFireInterval) { clearInterval(autoFireInterval); autoFireInterval = null; }
        if (animId) { cancelAnimationFrame(animId); animId = null; }
        document.getElementById('finalScore').textContent = 'SCORE: ' + formatScore(score);
        document.getElementById('hiScoreText').textContent = 'HI-SCORE: ' + formatScore(hiScore);
        document.getElementById('gameOverScreen').style.display = 'flex';
    }

    // ----- TOUCH CONTROLS -----
    let activeTouchId = null;
    let lastTouchX = 0;

    touchZone.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (!gameRunning) return;
        const t = e.changedTouches[0];
        activeTouchId = t.identifier;
        lastTouchX = t.clientX;
    }, { passive: false });

    touchZone.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (!gameRunning) return;
        const rect = touchZone.getBoundingClientRect();
        const scaleX = W / rect.width;
        for (let i = 0; i < e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            if (t.identifier === activeTouchId) {
                let deltaX = (t.clientX - lastTouchX) * scaleX;
                lastTouchX = t.clientX;
                player.x += deltaX;
                player.x = Math.max(player.w * 0.5, Math.min(W - player.w * 0.5, player.x));
            }
        }
    }, { passive: false });

    touchZone.addEventListener('touchend', function(e) {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === activeTouchId) activeTouchId = null;
        }
    }, { passive: false });

    touchZone.addEventListener('touchcancel', function() { activeTouchId = null; }, { passive: false });

    canvas.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

    // Keyboard
    let keys = {};
    document.addEventListener('keydown', function(e) { keys[e.key] = true; });
    document.addEventListener('keyup', function(e) { keys[e.key] = false; });
setInterval(function() {
        if (!gameRunning) return;
        if (keys['ArrowLeft'] || keys['a']) player.x = Math.max(player.w * 0.5, player.x - player.speed * scale);
        if (keys['ArrowRight'] || keys['d']) player.x = Math.min(W - player.w * 0.5, player.x + player.speed * scale);
        if (keys[' ']) fire();
        if (keys['Shift'] || keys['e']) activateSpecialPower();

        if (specialPowerCooldown > 0) {
            specialPowerCooldown -= 16;
            if (specialPowerCooldown <= 0) {
                specialPowerCooldown = 0;
                updateSpecialPowerUI(); // force update when reaching 0
            } else if (frameCount % 10 === 0) {
                updateSpecialPowerUI();
            }
        }
    }, 16);



    function updateCustomizationUI() {
        const shipGrid = document.getElementById('shipGrid');
        if (!shipGrid) return;
        const c1Input = document.getElementById('primaryColorInput');
        const c2Input = document.getElementById('secondaryColorInput');

        shipGrid.innerHTML = '';

        SHIP_MODELS.forEach((ship, index) => {
            const isUnlocked = hiScore >= ship.reqScore || isDebugMode;
            const isSelected = index === userShipSettings.modelIndex;

            const shipContainer = document.createElement('div');
            shipContainer.style.display = 'flex';
            shipContainer.style.flexDirection = 'column';
            shipContainer.style.alignItems = 'center';
            shipContainer.style.width = '160px';
            shipContainer.style.padding = '10px';
            shipContainer.style.border = isSelected ? '2px solid #0ff' : '2px solid #333';
            shipContainer.style.borderRadius = '8px';
            shipContainer.style.background = isSelected ? '#222' : '#111';
            shipContainer.style.cursor = isUnlocked ? 'pointer' : 'default';

            if (isUnlocked) {
                shipContainer.addEventListener('click', () => {
                    userShipSettings.modelIndex = index;
                    updateCustomizationUI();
                });
            }

            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            canvas.style.imageRendering = 'pixelated';
            canvas.style.marginBottom = '10px';

            const pctx = canvas.getContext('2d');
            pctx.imageSmoothingEnabled = false;

            // Render shadow silhouette if locked
            let sprite = renderCustomShipSprite(index, !isUnlocked);
            if (sprite && sprite.canvas) {
                let scaleFactor = 8;
                let sw = sprite.w * scaleFactor;
                let sh = sprite.h * scaleFactor;
                pctx.drawImage(sprite.canvas, (canvas.width - sw) / 2, (canvas.height - sh) / 2, sw, sh);
            }
            shipContainer.appendChild(canvas);

            const shipNameEl = document.createElement('span');
            shipNameEl.style.fontSize = 'clamp(12px, 3vw, 16px)';
            shipNameEl.style.color = isUnlocked ? (isSelected ? '#0ff' : '#ff0') : '#555';
            shipNameEl.textContent = ship.name;
            shipContainer.appendChild(shipNameEl);

                        const shipStatusEl = document.createElement('span');
            shipStatusEl.style.fontSize = '10px';
            shipStatusEl.style.marginTop = '5px';
            shipStatusEl.style.height = '12px';
            if (isUnlocked) {
                shipStatusEl.textContent = "UNLOCKED";
                shipStatusEl.style.color = '#0f0';
            } else {
                shipStatusEl.textContent = `SCORE: ${formatScore(ship.reqScore)}`;
                shipStatusEl.style.color = '#f00';
            }
            shipContainer.appendChild(shipStatusEl);

            if (isUnlocked) {
                const loreEl = document.createElement('p');
                loreEl.style.fontSize = '8px';
                loreEl.style.color = '#888';
                loreEl.style.marginTop = '8px';
                loreEl.style.textAlign = 'center';
                loreEl.style.fontStyle = 'italic';
                loreEl.style.lineHeight = '1.2';
                loreEl.textContent = ship.lore;
                shipContainer.appendChild(loreEl);

                const powerEl = document.createElement('div');
                powerEl.style.fontSize = '9px';
                powerEl.style.color = ship.powerColor;
                powerEl.style.marginTop = '4px';
                powerEl.style.fontWeight = 'bold';
                powerEl.textContent = `SPECIAL: ${ship.powerName.toUpperCase()}`;
                shipContainer.appendChild(powerEl);
            }

            shipGrid.appendChild(shipContainer);
        });

        const currentShip = SHIP_MODELS[userShipSettings.modelIndex];
        const currentIsUnlocked = hiScore >= currentShip.reqScore || isDebugMode;

        isShipUnlocked = currentIsUnlocked;

        if (currentIsUnlocked) {
            c1Input.disabled = false;
            c2Input.disabled = false;
            c1Input.style.opacity = 1;
            c2Input.style.opacity = 1;
        } else {
            c1Input.disabled = true;
            c2Input.disabled = true;
            c1Input.style.opacity = 0.3;
            c2Input.style.opacity = 0.3;
        }

        c1Input.value = userShipSettings.colors[currentShip.id].c1;
        c2Input.value = userShipSettings.colors[currentShip.id].c2;
    }

    // Customization Screen Events
    document.getElementById('openCustomizationBtn').addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('customizationScreen').style.display = 'flex';
        updateCustomizationUI();
    });

    document.getElementById('closeCustomizationBtn').addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();

        // If they locked the ship but close it, revert to Classic (index 0) to prevent playing locked ship
        if (hiScore < SHIP_MODELS[userShipSettings.modelIndex].reqScore && !isDebugMode) {
             userShipSettings.modelIndex = 0;
        }

        saveSettings();
        document.getElementById('customizationScreen').style.display = 'none';
        document.getElementById('startScreen').style.display = 'flex';
        isShipUnlocked = true; // since it defaults to classic if locked
        // We re-render sprites in case colors changed so the game loop has them
        renderedSprites.playerShip = renderCustomShipSprite(userShipSettings.modelIndex);
    });

    document.getElementById('primaryColorInput').addEventListener('input', function(e) {
        let shipId = SHIP_MODELS[userShipSettings.modelIndex].id;
        userShipSettings.colors[shipId].c1 = e.target.value;
        updateCustomizationUI();
    });

document.getElementById('secondaryColorInput').addEventListener('input', function(e) {
        let shipId = SHIP_MODELS[userShipSettings.modelIndex].id;
        userShipSettings.colors[shipId].c2 = e.target.value;
        updateCustomizationUI();
    });

    document.getElementById('resetColorsBtn').addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        let ship = SHIP_MODELS[userShipSettings.modelIndex];
        userShipSettings.colors[ship.id].c1 = ship.defaultColor1;
        userShipSettings.colors[ship.id].c2 = ship.defaultColor2;
        updateCustomizationUI();
    });


    function handleStartClick(e) {
        if (e) e.preventDefault();

        if (!isShipUnlocked) return;

        // Ensure audio context is started on user gesture
        Sound.resume();

        const coinAnim = document.getElementById('coinAnim');
        if (coinAnim && !coinAnim.classList.contains('drop')) {
            Sound.coinInsert();
            coinAnim.classList.add('drop');
            setTimeout(() => {
                coinAnim.classList.remove('drop');
                startGame();
            }, 800); // Wait for animation
        } else if (!coinAnim) {
            startGame();
        }
    }

    document.getElementById('startBtn').addEventListener('click', handleStartClick);
    document.getElementById('startBtn').addEventListener('touchend', handleStartClick);

    // For restart button, just start the game directly
    document.getElementById('restartBtn').addEventListener('click', function(e) { e.preventDefault(); startGame(); });
    document.getElementById('restartBtn').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });

    function handleChangeShipClick(e) {
        e.preventDefault();
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('customizationScreen').style.display = 'flex';
        updateCustomizationUI();
    }
    document.getElementById('changeShipBtn').addEventListener('click', handleChangeShipClick);
    document.getElementById('changeShipBtn').addEventListener('touchend', handleChangeShipClick);

    document.getElementById('muteBtn').addEventListener('click', function() { Sound.toggleMute(); });
    document.getElementById('muteBtn').addEventListener('touchend', function(e) { e.preventDefault(); Sound.toggleMute(); });

    // Also add keyboard shortcut 'm' for mute
    document.addEventListener('keydown', function(e) {
        if (e.key === 'm' || e.key === 'M') Sound.toggleMute();
    });

    document.addEventListener('touchmove', function(e) {
        if (e.target === document.body || e.target === document.documentElement) e.preventDefault();
    }, { passive: false });

    // --- DEBUG POWER-UPS UI ---
    if (isDebugMode) {
        const debugPanel = document.getElementById('debugPanel');
        const btnPrev = document.getElementById('debugPrev');
        const btnNext = document.getElementById('debugNext');
        const btnUse = document.getElementById('debugUse');
        const lblName = document.getElementById('debugPowerName');

        debugPanel.style.display = 'flex';

        let debugPowerIndex = 0;
        lblName.textContent = POWERUP_TYPES[debugPowerIndex].label;

        function updateDebugUI() {
            lblName.textContent = POWERUP_TYPES[debugPowerIndex].label;
            lblName.style.color = POWERUP_TYPES[debugPowerIndex].color;
        }

        function cycleDebugPower(delta, e) {
            e.preventDefault();
            e.stopPropagation();
            debugPowerIndex = (debugPowerIndex + delta + POWERUP_TYPES.length) % POWERUP_TYPES.length;
            updateDebugUI();
        }

        btnPrev.addEventListener('click', e => cycleDebugPower(-1, e));
        btnPrev.addEventListener('touchstart', e => cycleDebugPower(-1, e), { passive: false });

        btnNext.addEventListener('click', e => cycleDebugPower(1, e));
        btnNext.addEventListener('touchstart', e => cycleDebugPower(1, e), { passive: false });

        function useDebugPower(e) {
            e.preventDefault();
            e.stopPropagation();
            if (gameRunning && lives > 0) {
                let p = POWERUP_TYPES[debugPowerIndex];
                activatePowerUp(p.id, p.label, p.color);
            }
        }

        btnUse.addEventListener('click', useDebugPower);
        btnUse.addEventListener('touchstart', useDebugPower, { passive: false });

        updateDebugUI();
    }

    updateHiScoreDisplays();
    draw();

})();
</script>
</body>
</html>
