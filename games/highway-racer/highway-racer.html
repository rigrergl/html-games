<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Highway Racer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      touch-action: none;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      padding: 10px 14px;
      color: #fff;
      font-size: clamp(12px, 3vw, 16px);
      font-weight: bold;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 6px #000;
    }

    #canvas-wrap {
      position: relative;
      width: min(100vw, calc(100dvh * 0.55));
      height: min(100dvh, calc(100vw / 0.55));
      max-width: 420px;
      max-height: 100dvh;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Touch controls */
    #touch-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8%;
      pointer-events: none;
      z-index: 10;
    }

    .touch-btn {
      pointer-events: all;
      width: clamp(60px, 18vw, 90px);
      height: clamp(60px, 18vw, 90px);
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(22px, 6vw, 36px);
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
      transition: background 0.1s;
    }

    .touch-btn:active, .touch-btn.pressed {
      background: rgba(255,255,255,0.35);
    }

    /* Overlay screens */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      z-index: 20;
      color: #fff;
      text-align: center;
      padding: 16px;
    }

    #overlay h1 {
      font-size: clamp(24px, 8vw, 48px);
      color: #ffe44d;
      text-shadow: 0 0 20px #ffa500;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    #overlay p {
      font-size: clamp(13px, 3.5vw, 18px);
      color: #ccc;
      margin-bottom: 6px;
      max-width: 280px;
    }

    #overlay .score-display {
      font-size: clamp(18px, 5vw, 28px);
      color: #ffe44d;
      margin: 12px 0;
    }

    #start-btn {
      margin-top: 18px;
      padding: 12px 32px;
      font-size: clamp(15px, 4vw, 20px);
      font-family: 'Courier New', monospace;
      font-weight: bold;
      background: #ffe44d;
      color: #111;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 16px rgba(255,180,0,0.4);
    }

    #start-btn:hover, #start-btn:active {
      transform: scale(1.05);
      box-shadow: 0 6px 24px rgba(255,180,0,0.6);
    }

    #overlay.hidden { display: none; }
  </style>
</head>
<body>

<div id="canvas-wrap">
  <div id="hud">
    <span>SCORE: <span id="score-val">0</span></span>
    <span>BEST: <span id="best-val">0</span></span>
    <span>x<span id="speed-val">1.0</span></span>
  </div>

  <canvas id="c"></canvas>

  <div id="touch-controls">
    <div class="touch-btn" id="btn-left">◀</div>
    <div class="touch-btn" id="btn-right">▶</div>
  </div>

  <div id="overlay">
    <h1>HIGHWAY<br>RACER</h1>
    <p>Dodge traffic on the highway!</p>
    <p style="font-size:clamp(11px,3vw,14px); margin-top:8px;">
      ← → Arrow keys &nbsp;|&nbsp; A D keys<br>
      or use the on-screen buttons
    </p>
    <div id="final-score" class="score-display" style="display:none"></div>
    <button id="start-btn">START</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  // ── Resize canvas to fill wrapper ──────────────────────────────────────────
  const W = 420, H = 760; // logical resolution
  canvas.width = W;
  canvas.height = H;

  // ── Game constants ─────────────────────────────────────────────────────────
  const LANES = 5;
  const LANE_W = W / LANES;
  const PLAYER_W = 38, PLAYER_H = 70;
  const ENEMY_W = 38, ENEMY_H = 70;
  const ROAD_COLOR = '#2a2a2a';
  const LINE_COLOR = '#555';
  const STRIPE_H = 60, STRIPE_GAP = 60;

  // ── State ──────────────────────────────────────────────────────────────────
  let gameRunning = false;
  let score = 0, best = 0;
  let speed = 3;            // pixels per frame (road scroll)
  let frameCount = 0;
  let roadOffset = 0;
  let player, enemies, particles;
  let keys = {};

  const overlay   = document.getElementById('overlay');
  const startBtn  = document.getElementById('start-btn');
  const finalScore = document.getElementById('final-score');
  const scoreVal  = document.getElementById('score-val');
  const bestVal   = document.getElementById('best-val');
  const speedVal  = document.getElementById('speed-val');

  // ── Car colours ────────────────────────────────────────────────────────────
  const ENEMY_COLORS = ['#e74c3c','#3498db','#2ecc71','#9b59b6','#e67e22','#1abc9c'];

  function laneX(lane) { return lane * LANE_W + LANE_W / 2; }

  function initGame() {
    score = 0;
    speed = 3;
    frameCount = 0;
    roadOffset = 0;
    player = {
      lane: 2,
      x: laneX(2),
      y: H - PLAYER_H - Math.round(H * 0.32), // leave room for touch controls (28% of canvas)
      w: PLAYER_W,
      h: PLAYER_H,
      moving: false,
      targetX: laneX(2),
    };
    enemies = [];
    particles = [];
  }

  // ── Drawing helpers ────────────────────────────────────────────────────────
  function drawRoad() {
    ctx.fillStyle = ROAD_COLOR;
    ctx.fillRect(0, 0, W, H);

    // road edges (kerb)
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, 4, H);
    ctx.fillRect(W - 4, 0, 4, H);

    // dashed lane lines
    ctx.strokeStyle = LINE_COLOR;
    ctx.lineWidth = 2;
    ctx.setLineDash([STRIPE_H, STRIPE_GAP]);
    for (let i = 1; i < LANES; i++) {
      ctx.beginPath();
      ctx.moveTo(i * LANE_W, -roadOffset % (STRIPE_H + STRIPE_GAP));
      ctx.lineTo(i * LANE_W, H);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  function drawCar(x, y, w, h, color, isPlayer) {
    const r = 6;
    // body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x - w/2, y, w, h, r);
    ctx.fill();

    if (isPlayer) {
      // windshield
      ctx.fillStyle = 'rgba(100,200,255,0.6)';
      ctx.beginPath();
      ctx.roundRect(x - w/2 + 5, y + 8, w - 10, h * 0.28, 4);
      ctx.fill();
      // headlights
      ctx.fillStyle = '#ffe88a';
      ctx.beginPath(); ctx.ellipse(x - w/2 + 6, y + h - 10, 5, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + w/2 - 6, y + h - 10, 5, 4, 0, 0, Math.PI*2); ctx.fill();
      // exhaust glow
      ctx.fillStyle = 'rgba(255,120,0,0.5)';
      ctx.beginPath(); ctx.ellipse(x - 8, y + h + 3, 5, 3, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + 8, y + h + 3, 5, 3, 0, 0, Math.PI*2); ctx.fill();
    } else {
      // enemy windshield (top)
      ctx.fillStyle = 'rgba(100,200,255,0.5)';
      ctx.beginPath();
      ctx.roundRect(x - w/2 + 5, y + h - 8 - h * 0.28, w - 10, h * 0.28, 4);
      ctx.fill();
      // tail lights
      ctx.fillStyle = '#ff3333';
      ctx.beginPath(); ctx.ellipse(x - w/2 + 6, y + 10, 5, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + w/2 - 6, y + 10, 5, 4, 0, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawParticles() {
    for (let p of particles) {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function spawnExplosion(x, y) {
    const colors = ['#ff4500','#ff8c00','#ffd700','#fff'];
    for (let i = 0; i < 30; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = 1 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        r: 2 + Math.random() * 5,
        alpha: 1,
        color: colors[Math.floor(Math.random() * colors.length)],
      });
    }
  }

  function updateParticles() {
    for (let p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.alpha -= 0.03;
    }
    particles = particles.filter(p => p.alpha > 0);
  }

  // ── Enemy spawning ─────────────────────────────────────────────────────────
  function spawnEnemy() {
    const lane = Math.floor(Math.random() * LANES);
    // Don't spawn in same lane as player if too close
    const x = laneX(lane);
    const color = ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];
    // Check no overlap with existing enemies at top
    for (let e of enemies) {
      if (e.lane === lane && e.y < 100) return;
    }
    enemies.push({ lane, x, y: -ENEMY_H - 10, w: ENEMY_W, h: ENEMY_H, color });
  }

  // ── AABB collision ─────────────────────────────────────────────────────────
  function collides(a, b) {
    const margin = 6;
    return (
      a.x - a.w/2 + margin < b.x + b.w/2 - margin &&
      a.x + a.w/2 - margin > b.x - b.w/2 + margin &&
      a.y + margin < b.y + b.h - margin &&
      a.y + a.h - margin > b.y + margin
    );
  }

  // ── Input ──────────────────────────────────────────────────────────────────
  let moveBlock = false;

  function moveLeft() {
    if (!gameRunning || moveBlock) return;
    if (player.lane > 0) {
      player.lane--;
      player.targetX = laneX(player.lane);
      moveBlock = true;
    }
  }

  function moveRight() {
    if (!gameRunning || moveBlock) return;
    if (player.lane < LANES - 1) {
      player.lane++;
      player.targetX = laneX(player.lane);
      moveBlock = true;
    }
  }

  document.addEventListener('keydown', e => {
    if (!keys[e.code]) {
      keys[e.code] = true;
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft();
      if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight();
    }
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  // Touch buttons
  const btnLeft  = document.getElementById('btn-left');
  const btnRight = document.getElementById('btn-right');

  function touchStart(fn, btn) {
    btn.addEventListener('touchstart', e => { e.preventDefault(); btn.classList.add('pressed'); fn(); }, { passive: false });
    btn.addEventListener('touchend',   e => { e.preventDefault(); btn.classList.remove('pressed'); }, { passive: false });
    btn.addEventListener('mousedown',  e => { btn.classList.add('pressed'); fn(); });
    btn.addEventListener('mouseup',    e => { btn.classList.remove('pressed'); });
  }

  touchStart(moveLeft,  btnLeft);
  touchStart(moveRight, btnRight);

  // Swipe support
  let touchStartX = null;
  canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 30) { dx < 0 ? moveLeft() : moveRight(); }
    touchStartX = null;
  }, { passive: true });

  // ── Game loop ──────────────────────────────────────────────────────────────
  let lastTime = 0;
  let animId;

  function gameOver() {
    gameRunning = false;
    if (score > best) best = score;
    bestVal.textContent = best;
    spawnExplosion(player.x, player.y + player.h / 2);

    finalScore.style.display = 'block';
    finalScore.textContent = `Score: ${score}`;
    startBtn.textContent = 'PLAY AGAIN';
    overlay.classList.remove('hidden');
  }

  function loop(ts) {
    if (!gameRunning) return;
    animId = requestAnimationFrame(loop);

    const dt = Math.min((ts - lastTime) / 16.67, 3); // normalise to ~60fps frames
    lastTime = ts;

    frameCount++;

    // increase speed over time
    speed = 3 + frameCount * 0.003;
    speed = Math.min(speed, 14);
    speedVal.textContent = (speed / 3).toFixed(1);

    score += Math.round(speed * 0.5);
    scoreVal.textContent = score;

    // scroll road
    roadOffset += speed * dt;

    // smooth player movement
    player.x += (player.targetX - player.x) * 0.18 * dt * 3;
    if (Math.abs(player.x - player.targetX) < 1) {
      player.x = player.targetX;
      moveBlock = false;
    }

    // spawn enemies
    const spawnRate = Math.max(40, 100 - frameCount * 0.05);
    if (frameCount % Math.round(spawnRate) === 0) spawnEnemy();

    // update enemies
    for (let e of enemies) {
      e.y += speed * dt * 0.9; // enemies slower than road = catching up effect
    }
    enemies = enemies.filter(e => e.y < H + ENEMY_H + 10);

    // collision
    for (let e of enemies) {
      if (collides(player, e)) {
        gameOver();
        return;
      }
    }

    updateParticles();

    // ── Draw ──────────────────────────────────────────────────────────────
    drawRoad();

    for (let e of enemies) drawCar(e.x, e.y, e.w, e.h, e.color, false);
    drawCar(player.x, player.y, player.w, player.h, '#ffe44d', true);
    drawParticles();
  }

  function startGame() {
    initGame();
    overlay.classList.add('hidden');
    finalScore.style.display = 'none';
    gameRunning = true;
    lastTime = performance.now();
    cancelAnimationFrame(animId);
    animId = requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', startGame);

  // Draw idle road so it's not a black screen on load
  drawRoad();
</script>
</body>
</html>
